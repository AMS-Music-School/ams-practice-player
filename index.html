<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player PRO</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="icon" href="icon.png?v=1.0.6" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.6">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            touch-action: manipulation; /* モバイルのダブルタップズーム抑制 */
        }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: none;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
            min-height: 128px;
        }
        
        .waveform-label { 
            font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; font-variant-numeric: tabular-nums; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 25px; min-width: 50px; cursor: pointer; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 70px; text-align: right; font-size: 0.95rem; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 12px; margin: 15px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 52px; height: 52px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl:active { transform: scale(0.92); background: #333; }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 64px; height: 64px; border: none; }

        .custom-file-upload {
            display: block; width: 100%; padding: 14px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: var(--primary-color); 
            font-size: 0.9rem; text-align: center; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            font-weight: bold;
        }
        input[type="file"] { display: none; }

        #countdown-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; align-items: center; justify-content: center;
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            background: rgba(0,0,0,0.3); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; }

        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px;
        }
        .side-menu.open { right: 0; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2500; display: none; backdrop-filter: blur(3px);
        }

        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;
        }

        .menu-section-title { font-size: 0.75rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 10px; display: block; }
        
        .menu-item {
            display: flex; align-items: center; gap: 12px; color: var(--text-main); padding: 12px;
            text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: background 0.2s; font-size: 0.95rem;
        }
        .menu-item:active { background: #333; }

        .lang-select {
            width: 100%; padding: 12px; background: #2a2a2a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem;
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: var(--panel-bg); border: 1px solid var(--primary-color);
            border-radius: 16px; z-index: 4000; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; border-radius: 6px; font-size: 0.8rem; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .content-section.active { display: block; }

        .clear-btn-ja { background: #333; border: 1px solid transparent; color: var(--text-main); padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; min-width: 90px; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: var(--text-main); width: 44px; height: 36px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; max-height: 250px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .loop-item { 
            background: #252525; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;
        }
        .history-card {
            background: #252525; border: 1px solid var(--border-color); border-radius: 6px;
            padding: 10px 14px; min-width: 190px; max-width: 240px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        @media (max-width: 480px) {
            .btn-ctrl { width: 48px; height: 48px; }
            .play-main { width: 60px; height: 60px; }
            .adj-btn { width: 40px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER PRO</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)">
            <span class="material-icons">close</span>
        </button>
    </div>
    <span class="menu-section-title" id="langTitle">Language Settings</span>
    <select id="langSelect" class="lang-select" onchange="changeLanguage()">
        <option value="ja">日本語</option>
        <option value="en">English</option>
    </select>
    <span class="menu-section-title" id="helpTitle">Help & Guide</span>
    <div class="menu-item" onclick="showGuide('file')"><span class="material-icons">description</span><span id="guideFileTitle">Audio File Mode Guide</span></div>
    <div class="menu-item" onclick="showGuide('yt')"><span class="material-icons">smart_display</span><span id="guideYTTitle">YouTube Mode Guide</span></div>
</div>

<!-- Guides -->
<div id="guideModalFile" class="modal"><div class="guide-box-inner" id="guideFileContent"></div><button class="clear-btn-ja" id="closeBtn1" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button></div>
<div id="guideModalYT" class="modal"><div class="guide-box-inner" id="guideYTContent"></div><button class="clear-btn-ja" id="closeBtn2" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button></div>

<div class="container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <!-- Audio File Section -->
    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">
            <span class="material-icons" style="vertical-align:middle; font-size:1.2rem;">file_upload</span> ファイルを選択
        </label>
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus" style="font-weight:bold;">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <input type="range" id="zoomSlider" min="0" max="500" value="0" style="width:70px;">
                <button class="reset-btn" id="resetZoomBtn">FIT</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="clear-btn-container" style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()" id="clearRangeBtn"><span class="material-icons" style="font-size:16px;">layers_clear</span> 範囲解除</button>
            <button class="clear-btn-ja" onclick="saveLoop('file')" id="saveLoopBtn" style="border: 1px solid var(--primary-color);"><span class="material-icons" style="font-size:16px;">bookmark_add</span> 保存</button>
        </div>

        <div id="loopListFile" class="loop-list-container"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="skipWS(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:38px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="skipWS(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">1.0</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM 120</span>
            </div>
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">0</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <!-- YouTube Section -->
    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:12px; background:var(--panel-bg); padding:10px; border-radius:10px; border: 1px solid var(--border-color);">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:12px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:8px; font-size:0.9rem;">
            <button class="tab-btn active" style="flex:0; min-width:70px;" onclick="loadYouTube()">LOAD</button>
        </div>

        <div id="ytHistoryContainer" style="margin-bottom: 15px; display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <span style="font-size:0.7rem; color:var(--primary-color); font-weight:bold; letter-spacing:1px;">RECENT HISTORY</span>
                <button class="reset-btn" onclick="clearYTHistory()" style="font-size:0.6rem;">CLEAR ALL</button>
            </div>
            <div id="ytHistoryList" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:10px;"></div>
        </div>

        <div id="ytPlayerContainer"><div id="player"></div></div>
        
        <div class="panel" style="margin-top:15px;">
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" onclick="setLoopPoint('start')">SET START</button>
                <div style="background:#000; padding:6px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:8px;">
                    <button class="adj-btn" onclick="adjustTime('start', -1)">-1s</button>
                    <span id="loopStartTxt" class="time-display" style="min-width:50px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" onclick="setLoopPoint('end')">SET END</button>
                <div style="background:#000; padding:6px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:8px;">
                    <button class="adj-btn" onclick="adjustTime('end', -1)">-1s</button>
                    <span id="loopEndTxt" class="time-display" style="min-width:50px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 12px;">
                <button id="toggleLoopBtn" class="tab-btn" style="width:140px; border:1px solid var(--border-color);" onclick="toggleLoop()">LOOP OFF</button>
                <button class="clear-btn-ja" onclick="saveLoop('yt')" style="border: 1px solid var(--primary-color);"><span class="material-icons" style="font-size:18px;">bookmark_add</span> SAVE</button>
            </div>
        </div>
        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    const translations = {
        ja: {
            langTitle: "言語設定", helpTitle: "ヘルプ & ガイド", guideFile: "Audio Fileモード ガイド", guideYT: "YouTubeモード ガイド",
            close: "閉じる", fit: "全体表示", clear: "範囲解除", ready: "準備完了", analyzing: "解析中...",
            setStart: "開始位置", setEnd: "終了位置", loopOff: "ループ OFF", loopOn: "ループ ON",
            fileSelect: "ファイルを選択", saveLoop: "ループ保存",
            guideFileContent: "<b>【Audio File Mode】ガイド</b><ul><li>モバイル対応: 読み込みが止まった場合は再度選択してください。</li><li>スピード: 再生速度を変更しても音程は維持されます。</li><li>ループ: 波形をなぞって範囲指定、保存でリスト化できます。</li></ul>",
            guideYTContent: "<b>【YouTube Mode】ガイド</b><ul><li>履歴: 一度見た動画は履歴からすぐ呼び出せます。</li><li>区間指定: 秒単位の微調整ボタンを活用してください。</li></ul>"
        },
        en: {
            langTitle: "Language Settings", helpTitle: "Help & Guide", guideFile: "Audio File Mode Guide", guideYT: "YouTube Mode Guide",
            close: "Close", fit: "FIT", clear: "Clear Loop", ready: "READY", analyzing: "ANALYZING...",
            setStart: "SET START", setEnd: "SET END", loopOff: "LOOP OFF", loopOn: "LOOP ON",
            fileSelect: "Select File", saveLoop: "Save",
            guideFileContent: "<b>【Audio File Mode】Guide</b><ul><li>Mobile: If loading fails, re-select the file.</li><li>Speed: Change speed without affecting pitch.</li><li>Loop: Drag on waveform to set range and save.</li></ul>",
            guideYTContent: "<b>【YouTube Mode】Guide</b><ul><li>History: Recently played videos appear below the input.</li><li>Adjustment: Use +/- 1s buttons for precise looping.</li></ul>"
        }
    };

    let wavesurfer, wsRegions, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx, firstSoundTime = 0, originalBpm = 120;
    let currentObjectURL = null, currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;

    function toggleMenu(isOpen) {
        document.getElementById('sideMenu').classList.toggle('open', isOpen);
        document.getElementById('menuOverlay').style.display = isOpen ? 'block' : 'none';
    }

    function showGuide(type) {
        toggleMenu(false);
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById(type === 'file' ? 'guideModalFile' : 'guideModalYT').style.display = 'block';
        document.getElementById('menuOverlay').style.display = 'block';
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
        document.getElementById('menuOverlay').style.display = 'none';
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-yt').classList.toggle('active', mode === 'yt');
        if(mode === 'yt') {
            if(wavesurfer) wavesurfer.pause();
            renderYTHistory();
        } else {
            if(ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        }
    }

    // --- Audio File Logics ---
    async function analyzeAudio(file) {
        const statusEl = document.getElementById('loadStatus');
        const lang = document.getElementById('langSelect').value;
        statusEl.innerText = translations[lang].analyzing;

        // モバイルでのメモリ対策：古いURLを解放
        if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
        currentObjectURL = URL.createObjectURL(file);

        try {
            const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            
            // 無音カット位置の検出
            const data = audioBuffer.getChannelData(0);
            const threshold = 0.01;
            let skip = 0;
            for (let i = 0; i < data.length; i += 200) {
                if (Math.abs(data[i]) > threshold) { skip = i / audioBuffer.sampleRate; break; }
            }
            firstSoundTime = skip;
            
            // BPM検出 (簡易版)
            const bpm = detectBPM(audioBuffer);
            if (bpm > 0) { originalBpm = Math.round(bpm); updateBpmDisplay(); }
            
            wavesurfer.load(currentObjectURL);
            tempCtx.close();
        } catch (e) {
            console.error("Decode error", e);
            wavesurfer.load(currentObjectURL);
            statusEl.innerText = "LOAD ERROR";
        }
    }

    function detectBPM(buffer) {
        const data = buffer.getChannelData(0), step = 250, energy = [];
        for (let i = 0; i < Math.min(data.length, buffer.sampleRate * 60); i += step) {
            let sum = 0;
            for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j] * data[i+j];
            energy.push(Math.sqrt(sum/step));
        }
        let bestBpm = 0, maxCorr = 0;
        const minI = Math.floor((60/200)*(buffer.sampleRate/step)), maxI = Math.floor((60/60)*(buffer.sampleRate/step));
        for (let interval = minI; interval <= maxI; interval++) {
            let corr = 0;
            for (let i = 0; i < Math.min(energy.length - interval, 5000); i++) corr += energy[i] * energy[i+interval];
            if (corr > maxCorr) { maxCorr = corr; bestBpm = 60 / (interval * step / buffer.sampleRate); }
        }
        return (bestBpm < 50 || bestBpm > 250) ? 0 : bestBpm;
    }

    function playBeep(isLast) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
        osc.frequency.value = isLast ? 880 : 440;
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function runCountdown() {
        if (!isCountEnabled) return;
        const interval = 60000 / (originalBpm * parseFloat(document.getElementById('speed').value));
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'flex';
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i;
            playBeep(i === 4);
            await new Promise(r => setTimeout(r, interval));
        }
        overlay.style.display = 'none';
    }

    // --- YouTube Logics ---
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {}

    function loadYouTube(manualUrl = null) {
        const url = manualUrl || document.getElementById('ytUrl').value;
        if (!url) return;
        const vid = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.includes('be/') ? url.split('be/')[1].split('?')[0] : null;
        if (vid) {
            currentYTId = vid;
            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(vid);
            } else {
                ytPlayer = new YT.Player('player', { videoId: vid, events: { 'onStateChange': onYTStateChange, 'onReady': (e) => saveToHistory(vid, e.target.getVideoData().title) } });
            }
            document.getElementById('ytUrl').value = "";
        }
    }

    function saveToHistory(id, title) {
        let history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        history = history.filter(h => h.id !== id);
        history.unshift({ id, title: title || id, url: "https://www.youtube.com/watch?v="+id });
        if (history.length > 20) history.pop();
        localStorage.setItem('ams_yt_history', JSON.stringify(history));
        renderYTHistory();
        renderLoopList('yt');
    }

    function renderYTHistory() {
        const list = document.getElementById('ytHistoryList');
        const history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        document.getElementById('ytHistoryContainer').style.display = history.length ? 'block' : 'none';
        list.innerHTML = "";
        history.forEach(h => {
            const card = document.createElement('div');
            card.className = 'history-card';
            card.onclick = () => loadYouTube(h.url);
            card.innerHTML = `<span style="font-size:0.75rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${h.title}</span><span class="material-icons" style="color:#ff5555; font-size:18px;" onclick="event.stopPropagation(); deleteHistoryItem('${h.id}')">cancel</span>`;
            list.appendChild(card);
        });
    }

    window.deleteHistoryItem = (id) => {
        let history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        localStorage.setItem('ams_yt_history', JSON.stringify(history.filter(h => h.id !== id)));
        renderYTHistory();
    };

    function onYTStateChange(e) {
        if (e.data === YT.PlayerState.PLAYING) {
            const data = ytPlayer.getVideoData();
            if(data.title) saveToHistory(data.video_id, data.title);
            clearInterval(loopInterval);
            loopInterval = setInterval(() => {
                if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart);
            }, 200);
        } else { clearInterval(loopInterval); }
    }

    // --- UI Helpers ---
    const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    function setLoopPoint(type) {
        const now = ytPlayer.getCurrentTime();
        if (type === 'start') { loopStart = Math.floor(now); document.getElementById('loopStartTxt').innerText = fmt(loopStart); }
        else { loopEnd = Math.ceil(now); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    }

    function adjustTime(type, amt) {
        if (type === 'start') { loopStart = Math.max(0, loopStart + amt); document.getElementById('loopStartTxt').innerText = fmt(loopStart); ytPlayer.seekTo(loopStart); }
        else { loopEnd = Math.max(loopStart + 1, loopEnd + amt); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    }

    function toggleLoop() {
        isLooping = !isLooping;
        const b = document.getElementById('toggleLoopBtn');
        const lang = document.getElementById('langSelect').value;
        b.innerText = isLooping ? translations[lang].loopOn : translations[lang].loopOff;
        b.classList.toggle('active', isLooping);
    }

    function skipWS(val) { wavesurfer.skip(val); }

    function saveLoop(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        if (!key) return;
        let start, end;
        if (mode === 'file') {
            const r = wsRegions.getRegions()[0]; if(!r) return;
            start = r.start; end = r.end;
        } else { start = loopStart; end = loopEnd; }
        
        const name = prompt("Loop Name:", `Loop ${fmt(start)}-${fmt(end)}`);
        if (!name) return;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if (!all[key]) all[key] = [];
        all[key].push({ name, start, end });
        localStorage.setItem(storageKey, JSON.stringify(all));
        renderLoopList(mode);
    }

    function renderLoopList(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const container = document.getElementById(mode === 'file' ? 'loopListFile' : 'loopListYT');
        container.innerHTML = "";
        if (!key) return;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        const loops = JSON.parse(localStorage.getItem(storageKey) || "{}")[key] || [];
        loops.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'loop-item';
            div.innerHTML = `<div style="flex-grow:1" onclick="applyStoredLoop('${mode}', ${l.start}, ${l.end})"><b>${l.name}</b> <small>${fmt(l.start)}-${fmt(l.end)}</small></div><span class="material-icons" style="color:#ff5555; cursor:pointer" onclick="deleteLoop('${mode}', ${i})">delete</span>`;
            container.appendChild(div);
        });
    }

    window.applyStoredLoop = (mode, s, e) => {
        if (mode === 'file') {
            wsRegions.clearRegions();
            wsRegions.addRegion({ start: s, end: e, color: 'rgba(212, 163, 115, 0.2)' });
            wavesurfer.setTime(s);
        } else {
            loopStart = s; loopEnd = e;
            document.getElementById('loopStartTxt').innerText = fmt(s);
            document.getElementById('loopEndTxt').innerText = fmt(e);
            ytPlayer.seekTo(s);
            if(!isLooping) toggleLoop();
        }
    };

    window.deleteLoop = (mode, idx) => {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const skey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(skey) || "{}");
        all[key].splice(idx, 1);
        localStorage.setItem(skey, JSON.stringify(all));
        renderLoopList(mode);
    };

    function toggleFeature(type) {
        if (type === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled); }
        else { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled); }
    }

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang];
        document.getElementById('langTitle').innerText = t.langTitle;
        document.getElementById('helpTitle').innerText = t.helpTitle;
        document.getElementById('guideFileTitle').innerText = t.guideFile;
        document.getElementById('guideYTTitle').innerText = t.guideYT;
        document.getElementById('guideFileContent').innerHTML = t.guideFileContent;
        document.getElementById('guideYTContent').innerHTML = t.guideYTContent;
        document.getElementById('loadStatus').innerText = t.ready;
        document.getElementById('fileSelectBtn').innerHTML = `<span class="material-icons" style="vertical-align:middle; font-size:1.2rem;">file_upload</span> ${t.fileSelect}`;
    }

    function startApp() {
        wavesurfer = WaveSurfer.create({ 
            container: '#waveform', waveColor: '#444', progressColor: '#d4a373', height: 128, barWidth: 2, normalize: true, cursorColor: '#fff', 
            backend: 'WebAudio' // モバイルでの互換性のために明示
        });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });
        
        wsRegions.on('region-created', r => { if(wsRegions.getRegions().length > 1) wsRegions.getRegions()[0].remove(); wavesurfer.setTime(r.start); });

        document.getElementById('audioFile').onchange = e => { if(e.target.files[0]) { currentFileName = e.target.files[0].name; analyzeAudio(e.target.files[0]); } };
        
        const applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value), p = parseInt(document.getElementById('pitch').value);
            const media = wavesurfer.getMediaElement();
            if (media) {
                media.preservesPitch = true;
                if (p !== 0) { media.preservesPitch = false; wavesurfer.setPlaybackRate(s * Math.pow(2, p / 12)); }
                else { wavesurfer.setPlaybackRate(s); }
            }
            updateBpmDisplay();
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        wavesurfer.on('ready', () => { 
            const lang = document.getElementById('langSelect').value;
            document.getElementById('loadStatus').innerText = translations[lang].ready;
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration()); 
            applySettings(); 
            if(firstSoundTime > 0) wavesurfer.setTime(firstSoundTime); 
        });

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) { wavesurfer.pause(); } 
            else { 
                const r = wsRegions.getRegions()[0];
                if(r && (wavesurfer.getCurrentTime() < r.start || wavesurfer.getCurrentTime() >= r.end)) wavesurfer.setTime(r.start);
                await runCountdown(); wavesurfer.play(); 
            }
        };

        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if(r && t >= r.end) { 
                wavesurfer.setTime(r.start); 
                if(isSpeedUpEnabled) { 
                    const s = document.getElementById('speed'); 
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2); 
                    applySettings(); 
                }
            }
        });

        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;
        document.getElementById('zoomSlider').oninput = e => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => { wavesurfer.zoom(0); document.getElementById('zoomSlider').value = 0; };
        
        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');

        window.resetSetting = (id, val) => { document.getElementById(id).value = val; applySettings(); };
        window.clearYTHistory = () => { if(confirm("Clear all history?")) { localStorage.removeItem('ams_yt_history'); renderYTHistory(); }};
        
        function updateBpmDisplay() { document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * parseFloat(document.getElementById('speed').value)); }
        
        changeLanguage();
        renderYTHistory();
    }

    document.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
