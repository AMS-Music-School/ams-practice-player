<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player v1.2.0</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
            --recording-red: #ff4444;
            --solo-gold: #ffd700;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; padding-bottom: 40px; }
        
        #waveform-wrapper, #rec-waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
            min-height: 120px;
        }
        
        #rec-waveform-wrapper { min-height: 60px; margin-top: 8px; display: none; border: 1px solid var(--recording-red); cursor: pointer; }

        .waveform-label { 
            font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px;
            margin-bottom: 15px;
        }

        .panel-rec { padding: 10px 15px; gap: 8px; border-color: rgba(255, 68, 68, 0.4); }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; min-width: 50px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 70px; text-align: right; font-size: 0.95rem; }
        
        .transport-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }
        
        .rec-btn { color: var(--recording-red); border-color: #442222; width: 40px; height: 40px; }
        .rec-btn.recording { background: var(--recording-red); color: white; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .solo-btn { 
            background: #2a2a2a; color: var(--text-dim); border: 1px solid #444; border-radius: 4px; 
            padding: 4px 8px; font-weight: bold; font-size: 0.7rem; cursor: pointer; min-width: 32px;
        }
        .solo-btn.active { background: var(--solo-gold); color: #000; border-color: var(--solo-gold); }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; 
            font-size: 0.8rem; text-align: center; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        input[type="file"] { display: none; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; }

        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px;
        }
        .side-menu.open { right: 0; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2500; display: none;
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: var(--panel-bg); border: 1px solid var(--primary-color);
            border-radius: 16px; z-index: 4000; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .title-area { text-align: center; margin-bottom: 15px; }
        .title-area h2 { color: var(--primary-color); font-size: 0.9rem; letter-spacing: 4px; margin: 0; font-weight: bold; text-transform: uppercase; }

        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .loop-badge {
            background: #252525; padding: 6px 10px; border-radius: 20px;
            display: flex; align-items: center; gap: 6px; border: 1px solid var(--border-color);
            cursor: pointer; position: relative; transition: all 0.2s;
        }

        .history-card {
            background: #252525; border: 1px solid var(--border-color); border-radius: 6px;
            padding: 8px 12px; min-width: 180px; max-width: 220px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }

        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; display: flex; flex-wrap: wrap; gap: 10px; }
        
        .clear-btn-ja { background: #333; border: none; color: var(--text-main); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .rec-action-btn { padding: 4px 12px; font-size: 0.7rem; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding-bottom:15px; margin-bottom:20px;">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)">
            <span class="material-icons">close</span>
        </button>
    </div>
    <span class="menu-section-title" id="langTitle" style="font-size: 0.75rem; color: var(--primary-color); text-transform: uppercase; margin: 15px 0 10px; display: block;">Language Settings</span>
    <select id="langSelect" class="lang-select" style="width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px;" onchange="changeLanguage()">
        <option value="ja">日本語</option>
        <option value="en">English</option>
    </select>
</div>

<div id="guideModalFile" class="modal">
    <div class="guide-box-inner" id="guideFileContent"></div>
    <button class="clear-btn-ja" id="closeBtn1" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div class="container">
    <div class="title-area"><h2>AMS Practice Player</h2></div>
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">ファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="0" max="500" value="100" style="width:80px;">
                <button class="reset-btn" id="resetZoomBtn">FIT</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="clear-btn-container" style="display:flex; justify-content:center; gap:10px; margin-bottom:10px;">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()" id="clearRangeBtn">
                <span class="material-icons" style="font-size:16px;">layers_clear</span> 範囲解除
            </button>
            <button class="clear-btn-ja" onclick="saveLoop('file')" id="saveLoopBtn" style="border: 1px solid var(--primary-color);">
                <span class="material-icons" style="font-size:16px;">bookmark_add</span> ループ保存
            </button>
        </div>

        <div id="loopListFile" class="loop-list-container"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <!-- 録音パネル: ソロボタンと追従機能を追加 -->
        <div class="panel panel-rec">
            <div class="row">
                <span style="font-size:0.65rem; color:var(--recording-red); font-weight:bold; letter-spacing:0.5px;">SELF-RECORDING CHECK</span>
                <div style="display:flex; align-items:center; gap:10px;">
                    <button class="solo-btn" id="soloBtn" onclick="toggleSolo()">S</button>
                    <button class="btn-ctrl rec-btn" id="recBtn" onclick="toggleRecording()"><span class="material-icons" id="recIcon" style="font-size:20px;">mic</span></button>
                </div>
            </div>
            <div id="rec-waveform-wrapper"><div id="rec-waveform"></div></div>
            <div class="row" id="recControls" style="display:none; justify-content:center; gap:8px; margin-top:4px;">
                <button class="clear-btn-ja rec-action-btn" onclick="playRecording()" id="playRecBtn">
                    <span class="material-icons" style="font-size:14px;">play_circle</span> 録音再生
                </button>
                <button class="clear-btn-ja rec-action-btn" onclick="deleteRecording()" style="color:#ff5555;">
                    <span class="material-icons" style="font-size:14px;">delete</span> 削除
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM ---</span>
            </div>
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <!-- YouTubeセクション: 元の機能を完全維持 -->
    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:10px; background:var(--panel-bg); padding:10px; border-radius:10px; border: 1px solid var(--border-color);">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:10px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:6px; font-size:0.8rem;">
            <button class="tab-btn active" style="flex:0; min-width:60px;" onclick="loadYouTube()">LOAD</button>
        </div>
        <div id="ytHistoryContainer" style="margin-bottom: 15px; display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <span style="font-size:0.7rem; color:var(--primary-color); font-weight:bold;">RECENT HISTORY</span>
                <button class="reset-btn" onclick="clearYTHistory()" style="font-size:0.6rem;">Clear All</button>
            </div>
            <div id="ytHistoryList" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;"></div>
        </div>
        <div id="ytPlayerContainer"><div id="player"></div></div>
        <div class="panel" style="margin-top:15px;">
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" style="background:var(--primary-color); border:none; padding:8px 12px; border-radius:6px; font-size:0.75rem; font-weight:bold;" id="setStartBtn" onclick="setLoopPoint('start')">SET START</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" style="background:#333; border:1px solid var(--border-color); color:white; border-radius:4px; padding:4px 8px;" onclick="adjustTime('start', -1)">-1s</button>
                    <span id="loopStartTxt" class="time-display">00:00</span>
                    <button class="adj-btn" style="background:#333; border:1px solid var(--border-color); color:white; border-radius:4px; padding:4px 8px;" onclick="adjustTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px; margin-top:10px;">
                <button class="loop-btn-main" style="background:var(--primary-color); border:none; padding:8px 12px; border-radius:6px; font-size:0.75rem; font-weight:bold;" id="setEndBtn" onclick="setLoopPoint('end')">SET END</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" style="background:#333; border:1px solid var(--border-color); color:white; border-radius:4px; padding:4px 8px;" onclick="adjustTime('end', -1)">-1s</button>
                    <span id="loopEndTxt" class="time-display">00:00</span>
                    <button class="adj-btn" style="background:#333; border:1px solid var(--border-color); color:white; border-radius:4px; padding:4px 8px;" onclick="adjustTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px; margin-top:10px;">
                <button id="toggleLoopBtn" class="tab-btn" style="width:140px; border:1px solid var(--border-color);" onclick="toggleLoop()">LOOP OFF</button>
                <button class="clear-btn-ja" onclick="saveLoop('yt')" id="saveLoopBtnYT" style="border: 1px solid var(--primary-color); border-radius: 6px; padding: 8px 12px;">
                    <span class="material-icons" style="font-size:16px;">bookmark_add</span> SAVE
                </button>
            </div>
        </div>
        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    // 元の全翻訳データを保持
    const translations = {
        ja: { ready: "準備完了", analyzing: "解析中...", recPlay: "録音再生", recStop: "再生停止", setStart: "開始位置", setEnd: "終了位置", loopOff: "ループ OFF", loopOn: "ループ ON", fileSelect: "ファイルを選択", saveLoop: "ループ保存", fit: "全体表示", clear: "範囲解除" },
        en: { ready: "READY", analyzing: "ANALYZING...", recPlay: "Play Rec", recStop: "Stop Rec", setStart: "SET START", setEnd: "SET END", loopOff: "LOOP OFF", loopOn: "LOOP ON", fileSelect: "Select File", saveLoop: "Save Loop", fit: "FIT", clear: "Clear Loop" }
    };

    let wavesurfer, wsRegions, recWavesurfer, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx, firstSoundTime = 0, originalBpm = 120;
    let currentObjectURL = null, currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false, isSoloMode = false;
    let mediaRecorder, recordedChunks = [], isRecording = false;
    let recObjectURL = null, lastRecStartPos = 0;

    // ヘルパー関数群
    function toggleMenu(o) { document.getElementById('sideMenu').classList.toggle('open', o); document.getElementById('menuOverlay').style.display = o ? 'block' : 'none'; }
    function closeModals() { document.getElementById('guideModalFile').style.display = 'none'; document.getElementById('menuOverlay').style.display = 'none'; }
    function initAudioContext() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    
    function toggleSolo() {
        isSoloMode = !isSoloMode;
        document.getElementById('soloBtn').classList.toggle('active', isSoloMode);
    }

    function switchMode(m) {
        currentMode = m;
        document.getElementById('file-section').classList.toggle('active', m === 'file');
        document.getElementById('yt-section').classList.toggle('active', m === 'yt');
        document.getElementById('tab-file').classList.toggle('active', m === 'file');
        document.getElementById('tab-yt').classList.toggle('active', m === 'yt');
        if(m === 'yt') { if(wavesurfer) wavesurfer.pause(); renderYTHistory(); }
        if(m === 'file' && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
    }

    // 元の解析ロジックを維持
    async function analyzeAudio(blob) {
        const lang = document.getElementById('langSelect').value;
        document.getElementById('loadStatus').innerText = translations[lang].analyzing;
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            const data = audioBuffer.getChannelData(0);
            let skip = 0;
            for (let i = 0; i < data.length; i += 100) { if (Math.abs(data[i]) > 0.015) { skip = i / audioBuffer.sampleRate; break; } }
            firstSoundTime = skip;
            const bpm = detectBPM(audioBuffer);
            if (bpm > 0) { originalBpm = Math.round(bpm); updateBpmDisplay(); }
            document.getElementById('loadStatus').innerText = translations[lang].ready;
            if(wavesurfer) wavesurfer.setTime(firstSoundTime);
        } catch (e) { document.getElementById('loadStatus').innerText = translations[lang].ready; } finally { tempCtx.close(); }
    }

    function detectBPM(buffer) {
        const data = buffer.getChannelData(0), sampleRate = buffer.sampleRate, step = 200, energy = [];
        for (let i = 0; i < data.length; i += step) {
            let sum = 0; for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j] * data[i+j];
            energy.push(Math.sqrt(sum/step));
        }
        let bestBpm = 0, maxCorr = 0;
        for (let interval = Math.floor(sampleRate/step*0.3); interval <= Math.floor(sampleRate/step*1.0); interval++) {
            let corr = 0; for (let i = 0; i < Math.min(energy.length - interval, 10000); i++) corr += energy[i] * energy[i + interval];
            if (corr > maxCorr) { maxCorr = corr; bestBpm = 60 / (interval * step / sampleRate); }
        }
        return (bestBpm < 50 || bestBpm > 250) ? 0 : bestBpm;
    }

    function updateBpmDisplay() {
        document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * parseFloat(document.getElementById('speed').value));
    }

    // 録音ロジック: 元のカウントダウンと同期を保持
    async function toggleRecording() {
        initAudioContext();
        if (isRecording) {
            mediaRecorder.stop();
            wavesurfer.pause();
            isRecording = false;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recIcon').innerText = 'mic';
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                recordedChunks = [];
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                    if (recObjectURL) URL.revokeObjectURL(recObjectURL);
                    recObjectURL = URL.createObjectURL(blob);
                    document.getElementById('rec-waveform-wrapper').style.display = 'block';
                    document.getElementById('recControls').style.display = 'flex';
                    await recWavesurfer.load(recObjectURL);
                    stream.getTracks().forEach(t => t.stop());
                };
                const region = wsRegions.getRegions()[0];
                lastRecStartPos = region ? region.start : wavesurfer.getCurrentTime();
                wavesurfer.setTime(lastRecStartPos);
                if (isCountEnabled) await runCountdown();
                mediaRecorder.start();
                wavesurfer.play();
                isRecording = true;
                document.getElementById('recBtn').classList.add('recording');
                document.getElementById('recIcon').innerText = 'stop';
            } catch (err) { alert("マイクを許可してください"); }
        }
    }

    async function runCountdown() {
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'block';
        const interval = 60000 / (originalBpm * parseFloat(document.getElementById('speed').value));
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i;
            const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(i===4?880:440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime+0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime+0.1);
            await new Promise(r => setTimeout(r, interval));
        }
        overlay.style.display = 'none';
    }

    function playRecording() {
        if (recWavesurfer.isPlaying()) { recWavesurfer.pause(); wavesurfer.pause(); }
        else {
            wavesurfer.setTime(lastRecStartPos);
            recWavesurfer.setTime(0);
            if (!isSoloMode) wavesurfer.play();
            recWavesurfer.play();
        }
    }

    function deleteRecording() {
        if (confirm("削除しますか？")) {
            document.getElementById('rec-waveform-wrapper').style.display = 'none';
            document.getElementById('recControls').style.display = 'none';
            recWavesurfer.empty();
        }
    }

    // YouTube API & 履歴管理
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api"; document.head.appendChild(tag);
    function loadYouTube(u) {
        const url = u || document.getElementById('ytUrl').value;
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.includes('be/') ? url.split('be/')[1].split('?')[0] : null;
        if (id) {
            currentYTId = id;
            if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(id);
            else ytPlayer = new YT.Player('player', { videoId: id, events: { 'onStateChange': onPlayerStateChange, 'onReady': () => saveToHistory(id, ytPlayer.getVideoData().title) } });
            renderLoopList('yt');
        }
    }

    function saveToHistory(id, title) {
        let h = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        h = h.filter(x => x.id !== id); h.unshift({ id, title, url: `https://www.youtube.com/watch?v=${id}` });
        if (h.length > 10) h.pop(); localStorage.setItem('ams_yt_history', JSON.stringify(h)); renderYTHistory();
    }

    function renderYTHistory() {
        const list = document.getElementById('ytHistoryList');
        const h = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        document.getElementById('ytHistoryContainer').style.display = h.length ? 'block' : 'none';
        list.innerHTML = h.map(x => `<div class="history-card" onclick="loadYouTube('${x.url}')"><span style="font-size:0.7rem; overflow:hidden;">${x.title}</span></div>`).join('');
    }

    function onPlayerStateChange(e) {
        if (e.data === YT.PlayerState.PLAYING) {
            loopInterval = setInterval(() => { if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart); }, 200);
        } else clearInterval(loopInterval);
    }

    // ループ保存ロジック
    function saveLoop(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        if (!key) return;
        const start = mode === 'file' ? wsRegions.getRegions()[0]?.start : loopStart;
        const end = mode === 'file' ? wsRegions.getRegions()[0]?.end : loopEnd;
        if (start === undefined || end === undefined) return;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let loops = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if (!loops[key]) loops[key] = []; loops[key].push({ start, end });
        localStorage.setItem(storageKey, JSON.stringify(loops)); renderLoopList(mode);
    }

    function renderLoopList(mode) {
        const container = mode === 'file' ? document.getElementById('loopListFile') : document.getElementById('loopListYT');
        const key = mode === 'file' ? currentFileName : currentYTId;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        container.innerHTML = ""; if (!key) return;
        const loops = JSON.parse(localStorage.getItem(storageKey) || "{}")[key] || [];
        loops.forEach((l, i) => {
            const b = document.createElement('div'); b.className = 'loop-badge';
            b.innerHTML = `<span style="color:var(--primary-color); font-weight:bold;">${i+1}</span>`;
            b.onclick = () => {
                if (mode === 'file') { wsRegions.clearRegions(); wsRegions.addRegion({ start: l.start, end: l.end, color: 'rgba(212, 163, 115, 0.2)' }); wavesurfer.setTime(l.start); }
                else { loopStart = l.start; loopEnd = l.end; ytPlayer.seekTo(l.start); if(!isLooping) toggleLoop(); }
            };
            container.appendChild(b);
        });
    }

    // 初期化
    function startApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 120, barWidth: 2, normalize: true });
        recWavesurfer = WaveSurfer.create({ container: '#rec-waveform', waveColor: '#522', progressColor: '#f44', height: 60, barWidth: 2, normalize: true });
        
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });

        // 追従機能
        recWavesurfer.on('interaction', (newTime) => {
            const ratio = newTime / recWavesurfer.getDuration();
            const mainTime = lastRecStartPos + (ratio * recWavesurfer.getDuration());
            wavesurfer.setTime(mainTime);
        });

        document.getElementById('audioFile').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                currentFileName = file.name; document.getElementById('fileSelectBtn').innerText = file.name;
                const url = URL.createObjectURL(file); wavesurfer.load(url); analyzeAudio(file); renderLoopList('file');
            }
        };

        const applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value);
            const p = parseInt(document.getElementById('pitch').value);
            wavesurfer.setPlaybackRate(s);
            const media = wavesurfer.getMediaElement();
            if (media) {
                media.preservesPitch = true;
                if (media.detune !== undefined) media.detune = p * 100;
            }
            updateBpmDisplay();
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;
        document.getElementById('zoomSlider').oninput = e => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => wavesurfer.zoom(0);

        document.getElementById('playBtn').onclick = () => wavesurfer.isPlaying() ? wavesurfer.pause() : wavesurfer.play();
        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        
        wavesurfer.on('timeupdate', t => {
            const fmt = s => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
            document.getElementById('currentTime').innerText = fmt(t);
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration());
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });
    }

    // グローバル公開関数
    window.setLoopPoint = (t) => {
        const now = ytPlayer.getCurrentTime();
        if (t === 'start') { loopStart = Math.floor(now); document.getElementById('loopStartTxt').innerText = translations.ja.ready; }
        else { loopEnd = Math.ceil(now); document.getElementById('loopEndTxt').innerText = translations.ja.ready; }
    };
    window.toggleLoop = () => { isLooping = !isLooping; document.getElementById('toggleLoopBtn').classList.toggle('active', isLooping); };
    window.toggleFeature = (t) => {
        if (t==='count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled); }
        if (t==='speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled); }
    };
    window.resetSetting = (id, v) => { document.getElementById(id).value = v; updateBpmDisplay(); };

    window.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
