<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png?v=1.0.3" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.3">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 2px; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
        }
        
        .waveform-label { 
            font-size: 0.8em; color: var(--text-dim); margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: center; 
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1.3em; }

        .panel { 
            background: var(--panel-bg); padding: 22px; border-radius: 16px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 20px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 100px; text-align: right; font-size: 1.2em; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 20px; margin: 25px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); box-shadow: 0 0 10px rgba(212, 163, 115, 0.3); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 75px; height: 75px; border: none; }

        input[type="file"] { width: 100%; padding: 18px; border: 2px dashed var(--border-color); border-radius: 12px; margin-bottom: 20px; background: #181818; color: #888; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 100px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; pointer-events: none; text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
</header>

<div class="container">
    <input type="file" id="audioFile" accept="audio/*">

    <div class="waveform-label">
        <span id="loadStatus">READY</span>
        <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
    </div>
    
    <div id="waveform-wrapper">
        <div id="countdown-overlay"></div>
        <div id="waveform"></div>
    </div>

    <div style="text-align:center; margin-bottom:15px;">
        <button class="reset-btn" style="padding: 8px 18px; border-radius: 20px;" onclick="wsRegions.clearRegions()">範囲解除</button>
    </div>
    
    <div class="transport-controls">
        <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')">
            <span class="material-icons">timer</span>
        </button>
        <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
        <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:45px;">play_arrow</span></button>
        <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
        <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')">
            <span class="material-icons">speed</span>
        </button>
    </div>

    <div class="panel">
        <div class="row">
            <div style="min-width:100px; font-size:0.9em; color:var(--text-dim);">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
            <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
            <span id="speedBpmDisplay" class="val-display">BPM ---</span>
        </div>
        <div class="row">
            <div style="min-width:100px; font-size:0.9em; color:var(--text-dim);">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
            <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
            <span id="pitchTxt" class="val-display">±0</span>
        </div>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, isCountEnabled = true, isSpeedUpEnabled = false;
    let originalBpm = 0;

    function toggleFeature(type) {
        if (type === 'count') {
            isCountEnabled = !isCountEnabled;
            document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled);
        } else if (type === 'speedup') {
            isSpeedUpEnabled = !isSpeedUpEnabled;
            document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled);
        }
    }

    // BPM解析ロジックの修正
    async function analyzeBPM(file) {
        document.getElementById('loadStatus').innerText = "ANALYZING...";
        const context = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await context.decodeAudioData(arrayBuffer);
            const data = audioBuffer.getChannelData(0);
            
            let peaks = [];
            const threshold = 0.4;
            for (let i = 0; i < data.length; i += 1000) {
                if (data[i] > threshold) peaks.push(i);
            }
            let intervals = [];
            for (let i = 1; i < peaks.length; i++) intervals.push(peaks[i] - peaks[i-1]);
            
            if (intervals.length > 0) {
                let avgInterval = intervals.sort((a,b) => a-b)[Math.floor(intervals.length/2)];
                originalBpm = Math.round(60 / (avgInterval / audioBuffer.sampleRate));
                while (originalBpm > 200) originalBpm /= 2;
                while (originalBpm < 65) originalBpm *= 2;
                originalBpm = Math.round(originalBpm);
            } else {
                originalBpm = 120;
            }
            document.getElementById('loadStatus').innerText = "COMPLETE";
            applySettings();
        } catch (e) {
            originalBpm = 120;
            document.getElementById('loadStatus').innerText = "READY";
        } finally { context.close(); }
    }

    // Pitch固定とBPM連動表示の修正
    function applySettings() {
        if (!wavesurfer) return;
        const speed = parseFloat(document.getElementById('speed').value);
        const pitch = parseInt(document.getElementById('pitch').value);
        
        const media = wavesurfer.getMediaElement();
        if (media) {
            // Speedを変えてもPitchを変えない設定
            media.preservesPitch = true;
            // Pitchスライダーで意図的に音程を変える設定 (detune)
            if (media.detune !== undefined) {
                media.detune = pitch * 100;
            }
            wavesurfer.setPlaybackRate(speed);
        }
        
        // BPM表示の更新
        const currentBpm = originalBpm ? Math.round(originalBpm * speed) : "---";
        document.getElementById('speedBpmDisplay').innerText = `BPM ${currentBpm}`;
        document.getElementById('pitchTxt').innerText = (pitch > 0 ? "+" : "") + pitch;
    }

    function initApp() {
        wavesurfer = WaveSurfer.create({
            container: '#waveform',
            waveColor: '#444',
            progressColor: '#d4a373',
            height: 120,
            barWidth: 2,
            normalize: true,
        });

        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });

        wavesurfer.on('ready', () => {
            document.getElementById('totalTime').innerText = formatTime(wavesurfer.getDuration());
            applySettings();
        });

        wavesurfer.on('timeupdate', (t) => {
            document.getElementById('currentTime').innerText = formatTime(t);
            const region = wsRegions.getRegions()[0];
            // ループ処理と自動加速
            if (region && t >= region.end) {
                wavesurfer.setTime(region.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
    }

    async function runCountdown() {
        if (!isCountEnabled) return;
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'block';
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i;
            await new Promise(r => setTimeout(r, 500));
        }
        overlay.style.display = 'none';
    }

    document.getElementById('audioFile').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            analyzeBPM(file);
            wavesurfer.load(URL.createObjectURL(file));
        }
    };

    document.getElementById('playBtn').onclick = async () => {
        if (wavesurfer.isPlaying()) {
            wavesurfer.pause();
        } else {
            const region = wsRegions.getRegions()[0];
            if (region && wavesurfer.getCurrentTime() >= region.end) wavesurfer.setTime(region.start);
            await runCountdown();
            wavesurfer.play();
        }
    };

    document.getElementById('speed').oninput = applySettings;
    document.getElementById('pitch').oninput = applySettings;

    const formatTime = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    window.resetSetting = (id, val) => { document.getElementById(id).value = val; applySettings(); };

    initApp();
</script>
</body>
</html>
