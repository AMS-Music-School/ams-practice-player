<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png?v=1.0.7" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.7">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 2px; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 15px; overflow: hidden; min-height: 150px;
        }
        
        .waveform-label { 
            font-size: 0.8em; color: var(--text-dim); margin-bottom: 10px; 
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1.1em; }

        .panel { 
            background: var(--panel-bg); padding: 20px; border-radius: 16px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 15px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 90px; text-align: right; font-size: 1.05em; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 15px; margin: 25px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); box-shadow: 0 0 8px rgba(212, 163, 115, 0.3); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 75px; height: 75px; border: none; }

        input[type="file"] { width: 100%; padding: 15px; border: 2px dashed var(--border-color); border-radius: 10px; margin-bottom: 15px; background: #181818; color: #888; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 100px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 8px; border-radius: 4px; font-size: 0.7em; cursor: pointer; }

        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px;
        }

        .side-menu.open { right: 0; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2500; display: none;
        }

        .mode-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 25px; background: var(--panel-bg); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 600px; margin-left: auto; margin-right: auto; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; border-radius: 8px; font-size: 0.85em; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }
        
        .clear-btn-ja { background: #333; border: none; color: var(--text-main); padding: 8px 18px; border-radius: 20px; font-size: 0.8em; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)"><span class="material-icons">close</span></button>
    </div>
    <div class="menu-item" style="color:var(--text-dim); font-size:0.9em;">AMS Practice Player v1.0.7</div>
</div>

<div class="container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="0" max="500" value="0" style="width:100px;">
                <button class="reset-btn" id="resetZoomBtn">全体</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
            <div style="display:flex; align-items:center; gap:5px;">
                <span class="material-icons" style="font-size:16px;">volume_up</span>
                <input type="range" id="modelVol" min="0" max="1" step="0.05" value="0.8" style="width:60px;">
            </div>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div style="text-align:center; margin-bottom:10px;">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()">範囲解除</button>
        </div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:45px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:85px; font-weight:bold; color:var(--text-dim); font-size:0.9em;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">1.0</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM ---</span>
            </div>
            <div class="row">
                <div style="min-width:85px; font-weight:bold; color:var(--text-dim); font-size:0.9em;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">0</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <div id="yt-section" class="content-section">
        <p style="text-align:center; color:var(--text-dim);">YouTube Modeは準備中です</p>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, audioCtx;
    let originalBpm = 120, firstSoundTime = 0, currentObjectURL = null;
    let isCountEnabled = true, isSpeedUpEnabled = false;

    function toggleMenu(isOpen) {
        document.getElementById('sideMenu').classList.toggle('open', isOpen);
        document.getElementById('menuOverlay').style.display = isOpen ? 'block' : 'none';
    }

    function toggleFeature(type) {
        if (type === 'count') {
            isCountEnabled = !isCountEnabled;
            document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled);
        } else if (type === 'speedup') {
            isSpeedUpEnabled = !isSpeedUpEnabled;
            document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled);
        }
    }

    function switchMode(mode) {
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-yt').classList.toggle('active', mode === 'yt');
    }

    const fmt = (s) => {
        if (isNaN(s)) return "00:00";
        return `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    };

    // BPM解析ロジック
    async function analyzeAudio(file) {
        document.getElementById('loadStatus').innerText = "ANALYZING...";
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            
            // 無音カット位置の検出
            const data = audioBuffer.getChannelData(0);
            for (let i = 0; i < data.length; i++) { 
                if (Math.abs(data[i]) > 0.015) { 
                    firstSoundTime = i / audioBuffer.sampleRate; 
                    break; 
                } 
            }
            
            // BPM検出 (簡易)
            const bpm = detectBPM(audioBuffer);
            originalBpm = (bpm > 50 && bpm < 200) ? Math.round(bpm) : 120;
            
            updateBpmDisplay();
            document.getElementById('loadStatus').innerText = "COMPLETE";
            if(wavesurfer) wavesurfer.setTime(firstSoundTime);
        } catch (e) {
            console.error(e);
            document.getElementById('loadStatus').innerText = "ERROR";
        } finally { tempCtx.close(); }
    }

    function detectBPM(buffer) {
        const data = buffer.getChannelData(0);
        const step = 200;
        const energy = [];
        for (let i = 0; i < data.length; i += step) {
            let sum = 0;
            for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j] * data[i+j];
            energy.push(Math.sqrt(sum/step));
        }
        let bestBpm = 0, maxCorr = 0;
        const minI = Math.floor((60/200)*(buffer.sampleRate/step));
        const maxI = Math.floor((60/60)*(buffer.sampleRate/step));
        for (let i = minI; i <= maxI; i++) {
            let corr = 0;
            for (let j = 0; j < Math.min(energy.length-i, 1000); j++) corr += energy[j] * energy[j+i];
            if (corr > maxCorr) { maxCorr = corr; bestBpm = 60 / (i * step / buffer.sampleRate); }
        }
        return bestBpm;
    }

    function updateBpmDisplay() {
        const speed = parseFloat(document.getElementById('speed').value);
        document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * speed);
    }

    function initWaveSurfer() {
        wavesurfer = WaveSurfer.create({ 
            container: '#waveform', 
            waveColor: '#444', 
            progressColor: '#d4a373', 
            height: 150, 
            barWidth: 2,
            normalize: true,
            minPxPerSec: 50
        });

        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });

        wavesurfer.on('ready', () => {
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration());
            applySettings();
        });

        wavesurfer.on('timeupdate', (t) => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
    }

    function applySettings() {
        if (!wavesurfer) return;
        const s = parseFloat(document.getElementById('speed').value);
        const p = parseInt(document.getElementById('pitch').value);
        const media = wavesurfer.getMediaElement();
        if (media) {
            media.preservesPitch = true;
            if (media.detune !== undefined) {
                media.detune = p * 100;
                wavesurfer.setPlaybackRate(s);
            } else {
                wavesurfer.setPlaybackRate(s * Math.pow(2, p / 12));
            }
        }
        updateBpmDisplay();
        document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
    }

    async function runCountdown() {
        if (!isCountEnabled) return;
        const interval = 60000 / (originalBpm * parseFloat(document.getElementById('speed').value));
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'block';
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i;
            // ビープ音
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const g = ctx.createGain();
            osc.frequency.value = i === 4 ? 880 : 440;
            g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
            osc.connect(g); g.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 0.1);
            await new Promise(r => setTimeout(r, interval));
        }
        overlay.style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', () => {
        initWaveSurfer();

        document.getElementById('audioFile').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(file);
                wavesurfer.load(currentObjectURL);
                analyzeAudio(file);
            }
        };

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) {
                wavesurfer.pause();
            } else {
                const r = wsRegions.getRegions()[0];
                if (isCountEnabled) {
                    if (r && (wavesurfer.getCurrentTime() < r.start || wavesurfer.getCurrentTime() >= r.end)) {
                        wavesurfer.setTime(r.start);
                    }
                    await runCountdown();
                }
                wavesurfer.play();
            }
        };

        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;
        document.getElementById('modelVol').oninput = e => wavesurfer.setVolume(e.target.value);
        document.getElementById('zoomSlider').oninput = e => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => {
            document.getElementById('zoomSlider').value = 0;
            wavesurfer.zoom(0);
        };
        
        window.resetSetting = (id, val) => {
            document.getElementById(id).value = val;
            applySettings();
        };
    });
</script>
</body>
</html>
