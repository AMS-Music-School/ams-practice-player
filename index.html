<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png?v=1.0.7" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.7">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
        }
        
        .waveform-label { 
            font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; min-width: 50px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 70px; text-align: right; font-size: 0.95rem; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }

        .custom-file-btn {
            display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; 
            font-size: 0.8rem; text-align: center; cursor: pointer;
        }
        #audioFile { display: none; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; }

        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px; overflow-y: auto;
        }

        .side-menu.open { right: 0; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2500; display: none;
        }

        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;
        }

        .menu-section-title { font-size: 0.75rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 10px; display: block; }
        
        .menu-item {
            display: flex; align-items: center; gap: 12px; color: var(--text-main); padding: 10px;
            text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: background 0.2s; font-size: 0.9rem;
        }
        .menu-item:hover { background: #333; }

        .lang-select {
            width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem;
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: var(--panel-bg); border: 1px solid var(--primary-color);
            border-radius: 16px; z-index: 4000; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .title-area { text-align: center; margin-bottom: 15px; }
        .title-area h2 { color: var(--primary-color); font-size: 0.9rem; letter-spacing: 4px; margin: 0; font-weight: bold; text-transform: uppercase; }

        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .clear-btn-container { margin-bottom: 10px; text-align: center; display: flex; justify-content: center; gap: 10px; }
        .clear-btn-ja { background: #333; border: none; color: var(--text-main); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; min-width: 80px; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        #toggleLoopBtn { background: #2a2a2a; color: var(--text-dim); border: 1px solid var(--border-color); transition: all 0.3s ease; }
        #toggleLoopBtn.active { background: var(--primary-color); color: #121212; border: 1px solid var(--primary-color); font-weight: bold; }

        .save-list { margin-top: 10px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border-color); border-radius: 8px; padding: 5px; }
        .save-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid #2a2a2a; font-size: 0.8rem; }
        .save-item:last-child { border-bottom: none; }
        .save-item-name { color: var(--text-main); cursor: pointer; flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .delete-icon { color: #ff5555; cursor: pointer; font-size: 16px; margin-left: 10px; }

        @media (max-width: 480px) {
            .transport-controls { gap: 8px; }
            .btn-ctrl { width: 42px; height: 42px; }
            .play-main { width: 55px; height: 55px; }
            .val-display { min-width: 60px; font-size: 0.85rem; }
            .time-display { font-size: 0.9rem; }
            .adj-btn { width: 36px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)"><span class="material-icons">close</span></button>
    </div>

    <span class="menu-section-title" id="langTitle">Language Settings</span>
    <select id="langSelect" class="lang-select" onchange="changeLanguage()">
        <option value="ja">日本語</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="es">Español</option>
        <option value="ko">한국어</option>
    </select>

    <span class="menu-section-title" id="helpTitle">Help & Guide</span>
    <div class="menu-item" onclick="showGuide('file')"><span class="material-icons">description</span><span id="guideFileTitle">File Mode Guide</span></div>
    <div class="menu-item" onclick="showGuide('yt')"><span class="material-icons">smart_display</span><span id="guideYTTitle">YT Mode Guide</span></div>
</div>

<div id="guideModalFile" class="modal">
    <div class="guide-box-inner" id="guideFileContent"></div>
    <button class="clear-btn-ja" id="closeBtn1" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div id="guideModalYT" class="modal">
    <div class="guide-box-inner" id="guideYTContent"></div>
    <button class="clear-btn-ja" id="closeBtn2" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div class="container">
    <div class="title-area"><h2>AMS Practice Player</h2></div>

    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-btn" id="fileBtnLabel">オーディオファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*, .mp3, .wav, .m4a, .aac, .mp4, .ogg, .flac">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="0" max="500" value="100" style="width:80px;">
                <button class="reset-btn" id="resetZoomBtn">FIT</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="clear-btn-container">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()" id="clearRangeBtn"><span class="material-icons" style="font-size:16px;">layers_clear</span> 範囲解除</button>
            <button class="clear-btn-ja" onclick="saveLoop()" id="saveLoopBtn" style="background:var(--primary-color); color:#121212;"><span class="material-icons" style="font-size:16px;">bookmark</span> ループ保存</button>
        </div>

        <div id="loopList" class="save-list" style="display:none; margin-bottom:15px;"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM 120</span>
            </div>
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <div id="yt-section" class="content-section">
        <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:15px; background:var(--panel-bg); padding:10px; border-radius:10px; border: 1px solid var(--border-color);">
            <div style="display:flex; gap:8px;">
                <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:10px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:6px; font-size:0.8rem;">
                <button class="tab-btn active" style="flex:0; min-width:60px;" onclick="loadYouTube()">LOAD</button>
            </div>
            <button class="clear-btn-ja" onclick="saveYTVideo()" style="justify-content:center; background:#444;"><span class="material-icons" style="font-size:16px;">library_add</span> この動画をリストに保存</button>
        </div>

        <div id="ytSaveList" class="save-list" style="display:none; margin-bottom:15px;"></div>

        <div id="ytPlayerContainer"><div id="player"></div></div>
        
        <div class="panel" style="margin-top:15px;">
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" id="setStartBtn" onclick="setLoopPoint('start')">SET START</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('start', -1)">-1s</button>
                    <span id="loopStartTxt" class="time-display">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" id="setEndBtn" onclick="setLoopPoint('end')">SET END</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('end', -1)">-1s</button>
                    <span id="loopEndTxt" class="time-display">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; margin-top:5px;">
                <button id="toggleLoopBtn" class="tab-btn" style="width:160px;" onclick="toggleLoop()">LOOP OFF</button>
            </div>
        </div>
    </div>
</div>

<script>
    const translations = {
        ja: {
            langTitle: "言語設定", helpTitle: "ヘルプ & ガイド", guideFile: "Audio Fileモード ガイド", guideYT: "YouTubeモード ガイド",
            close: "閉じる", fit: "全体表示", clear: "範囲解除", ready: "準備完了", analyzing: "解析中...",
            setStart: "開始位置", setEnd: "終了位置", loopOff: "ループ OFF", loopOn: "ループ ON",
            btnSelect: "オーディオファイルを選択", saveLoop: "ループ保存", saveVideo: "動画保存",
            guideFileContent: "<b>【Audio File Mode】</b><ul><li>曲ごとにループ箇所を保存できます。</li><li>波形ドラッグで範囲指定し「ループ保存」で記録。</li></ul>",
            guideYTContent: "<b>【YouTube Mode】</b><ul><li>「動画をリストに保存」でURLをストックできます。</li></ul>"
        },
        en: {
            langTitle: "Language Settings", helpTitle: "Help & Guide", guideFile: "File Mode Guide", guideYT: "YT Mode Guide",
            close: "Close", fit: "FIT", clear: "Clear Loop", ready: "READY", analyzing: "ANALYZING...",
            setStart: "SET START", setEnd: "SET END", loopOff: "LOOP OFF", loopOn: "LOOP ON",
            btnSelect: "Select Audio File", saveLoop: "Save Loop", saveVideo: "Save Video",
            guideFileContent: "<b>【Audio File Mode】</b><ul><li>Saves loop points per song.</li><li>Drag waveform and click 'Save Loop'.</li></ul>",
            guideYTContent: "<b>【YouTube Mode】</b><ul><li>Use 'Save Video' to bookmark URLs.</li></ul>"
        }
    };

    function changeLanguage() {
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang] || translations['en'];
        document.getElementById('langTitle').innerText = t.langTitle;
        document.getElementById('helpTitle').innerText = t.helpTitle;
        document.getElementById('guideFileTitle').innerText = t.guideFile;
        document.getElementById('guideYTTitle').innerText = t.guideYT;
        document.getElementById('closeBtn1').innerText = t.close;
        document.getElementById('closeBtn2').innerText = t.close;
        document.getElementById('resetZoomBtn').innerText = t.fit;
        document.getElementById('clearRangeBtn').innerHTML = `<span class="material-icons" style="font-size:16px;">layers_clear</span> ${t.clear}`;
        document.getElementById('saveLoopBtn').innerHTML = `<span class="material-icons" style="font-size:16px;">bookmark</span> ${t.saveLoop}`;
        document.getElementById('setStartBtn').innerText = t.setStart;
        document.getElementById('setEndBtn').innerText = t.setEnd;
        document.getElementById('guideFileContent').innerHTML = t.guideFileContent;
        document.getElementById('guideYTContent').innerHTML = t.guideYTContent;
        document.getElementById('fileBtnLabel').innerText = (currentFileName) ? currentFileName : t.btnSelect;
        
        const loadS = document.getElementById('loadStatus');
        if (loadS.innerText.match(/READY|準備|就緒|LISTO/)) loadS.innerText = t.ready;
        const loopB = document.getElementById('toggleLoopBtn');
        if (loopB) loopB.innerText = isLooping ? t.loopOn : t.loopOff;
    }

    let wavesurfer, wsRegions, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx, firstSoundTime = 0, originalBpm = 120, currentObjectURL = null, currentFileName = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;
    let allSavedLoops = {}, savedVideos = [];

    function toggleMenu(isOpen) {
        document.getElementById('sideMenu').classList.toggle('open', isOpen);
        document.getElementById('menuOverlay').style.display = isOpen ? 'block' : 'none';
    }

    function showGuide(type) {
        toggleMenu(false); closeModals();
        document.getElementById('guideModal' + (type === 'file' ? 'File' : 'YT')).style.display = 'block';
        document.getElementById('menuOverlay').style.display = 'block';
    }

    function closeModals() {
        document.getElementById('guideModalFile').style.display = 'none';
        document.getElementById('guideModalYT').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'none';
    }

    function toggleFeature(type) {
        if (type === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled); } 
        else if (type === 'speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled); }
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-yt').classList.toggle('active', mode === 'yt');
        if(mode === 'yt' && wavesurfer) wavesurfer.pause();
        if(mode === 'file' && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
    }

    // --- 曲ごとのABループ保存 ---
    function saveLoop() {
        if (!currentFileName) return alert("Please load an audio file first.");
        const region = wsRegions.getRegions()[0];
        if (!region) return;
        const name = prompt("Name this loop:", `Loop ${(allSavedLoops[currentFileName] || []).length + 1}`);
        if (name) {
            if (!allSavedLoops[currentFileName]) allSavedLoops[currentFileName] = [];
            allSavedLoops[currentFileName].push({ name, start: region.start, end: region.end });
            localStorage.setItem('ams_saved_loops_v2', JSON.stringify(allSavedLoops));
            renderLoopList();
        }
    }

    function renderLoopList() {
        const container = document.getElementById('loopList');
        container.innerHTML = "";
        const loops = allSavedLoops[currentFileName] || [];
        if (!currentFileName || loops.length === 0) { container.style.display = "none"; return; }
        container.style.display = "block";
        loops.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = "save-item";
            div.innerHTML = `<span class="save-item-name">${item.name} (${fmt(item.start)}-${fmt(item.end)})</span><span class="material-icons delete-icon" onclick="deleteLoop(${index})">delete</span>`;
            div.querySelector('.save-item-name').onclick = () => {
                wsRegions.clearRegions();
                wsRegions.addRegion({ start: item.start, end: item.end, color: 'rgba(212, 163, 115, 0.2)' });
                wavesurfer.setTime(item.start);
            };
            container.appendChild(div);
        });
    }

    function deleteLoop(index) {
        allSavedLoops[currentFileName].splice(index, 1);
        if (allSavedLoops[currentFileName].length === 0) delete allSavedLoops[currentFileName];
        localStorage.setItem('ams_saved_loops_v2', JSON.stringify(allSavedLoops));
        renderLoopList();
    }

    // --- YouTubeリスト保存 ---
    function saveYTVideo() {
        const url = document.getElementById('ytUrl').value;
        if (!url) return;
        const name = prompt("Video Title:", "My Video");
        if (name) {
            savedVideos.push({ name, url });
            localStorage.setItem('ams_saved_videos', JSON.stringify(savedVideos));
            renderYTList();
        }
    }

    function renderYTList() {
        const container = document.getElementById('ytSaveList');
        container.innerHTML = "";
        if (savedVideos.length === 0) { container.style.display = "none"; return; }
        container.style.display = "block";
        savedVideos.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = "save-item";
            div.innerHTML = `<span class="save-item-name">${item.name}</span><span class="material-icons delete-icon" onclick="deleteYT(${index})">delete</span>`;
            div.querySelector('.save-item-name').onclick = () => {
                document.getElementById('ytUrl').value = item.url;
                loadYouTube();
            };
            container.appendChild(div);
        });
    }

    function deleteYT(index) {
        savedVideos.splice(index, 1);
        localStorage.setItem('ams_saved_videos', JSON.stringify(savedVideos));
        renderYTList();
    }

    // --- 設定反映 (Speed & Pitch) ---
    const applySettings = () => {
        if (!wavesurfer) return;
        const s = parseFloat(document.getElementById('speed').value);
        const p = parseInt(document.getElementById('pitch').value);
        const m = wavesurfer.getMediaElement();
        if (m) { 
            // 速度にかかわらずピッチを維持する設定
            m.preservesPitch = true; 
            wavesurfer.setPlaybackRate(s); 
            // ピッチ（半音）の変更。detuneはセント単位（100セント=1半音）
            if (m.detune !== undefined) {
                m.detune = p * 100;
            } else if (m.mozPreservesPitch !== undefined) {
                m.mozPreservesPitch = true;
            }
        }
        document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * s);
        document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
    };

    // --- 音声解析 ---
    async function analyzeAudio(file) {
        const lang = document.getElementById('langSelect').value;
        document.getElementById('loadStatus').innerText = (translations[lang] || translations['en']).analyzing;
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuf = await file.arrayBuffer();
            const buf = await tempCtx.decodeAudioData(arrayBuf);
            const data = buf.getChannelData(0);
            
            // 無音部分のスキップ検出
            for (let i = 0; i < data.length; i++) { 
                if (Math.abs(data[i]) > 0.015) { 
                    firstSoundTime = i / buf.sampleRate; 
                    break; 
                } 
            }
            
            // BPM検出の精度向上版
            const bpm = detectBPM(buf);
            if (bpm > 0) { 
                originalBpm = Math.round(bpm); 
            } else {
                originalBpm = 120; // 検出不能時のデフォルト
            }
            
            applySettings();
            document.getElementById('loadStatus').innerText = (translations[lang] || translations['en']).ready;
            if(wavesurfer) wavesurfer.setTime(firstSoundTime);
        } catch (e) {
            console.error("Audio analysis error:", e);
            document.getElementById('loadStatus').innerText = (translations[lang] || translations['en']).ready;
        } finally { tempCtx.close(); }
    }

    // BPM検出アルゴリズム（オートコリレーション法）
    function detectBPM(buffer) {
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        
        // 低解像度でエネルギー計算を行う（計算量削減）
        const step = 250; 
        const energy = [];
        for (let i = 0; i < data.length; i += step) {
            let sum = 0; 
            for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j]**2;
            energy.push(Math.sqrt(sum/step));
        }
        
        let bestBpm = 0;
        let maxCorrelation = 0;
        
        // BPM 60〜200の範囲でサーチ
        const minInterval = Math.floor((60 / 200) * (sampleRate / step));
        const maxInterval = Math.floor((60 / 60) * (sampleRate / step));
        
        for (let interval = minInterval; interval <= maxInterval; interval++) {
            let correlation = 0;
            // 先頭付近のサンプルを使って相関を計算
            const searchLimit = Math.min(energy.length - interval, 4000);
            for (let j = 0; j < searchLimit; j++) {
                correlation += energy[j] * energy[j + interval];
            }
            if (correlation > maxCorrelation) {
                maxCorrelation = correlation;
                bestBpm = 60 / (interval * step / sampleRate);
            }
        }
        
        // 倍テンポ・半分テンポの補正（簡易版）
        if (bestBpm < 75) bestBpm *= 2;
        if (bestBpm > 150) bestBpm /= 2;

        return (bestBpm < 50 || bestBpm > 250) ? 0 : bestBpm;
    }

    // --- YT Player ---
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    function loadYouTube() {
        const url = document.getElementById('ytUrl').value;
        const id = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.includes('be/') ? url.split('be/')[1].split('?')[0] : null;
        if (id) {
            if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(id);
            else ytPlayer = new YT.Player('player', { videoId: id, events: { 'onStateChange': (e) => {
                if (e.data == 1) loopInterval = setInterval(() => { if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart); }, 200);
                else clearInterval(loopInterval);
            }}});
        }
    }

    const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    function setLoopPoint(t) {
        const now = ytPlayer.getCurrentTime();
        if (t === 'start') { loopStart = Math.floor(now); document.getElementById('loopStartTxt').innerText = fmt(loopStart); }
        else { loopEnd = Math.ceil(now); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    }
    function adjustTime(t, a) {
        if (t === 'start') { loopStart = Math.max(0, loopStart + a); document.getElementById('loopStartTxt').innerText = fmt(loopStart); ytPlayer.seekTo(loopStart); }
        else { loopEnd = Math.max(loopStart + 1, loopEnd + a); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    }
    function toggleLoop() { 
        isLooping = !isLooping; 
        const b = document.getElementById('toggleLoopBtn');
        const lang = document.getElementById('langSelect').value;
        const t = translations[lang] || translations['en'];
        b.innerText = isLooping ? t.loopOn : t.loopOff; 
        b.classList.toggle('active', isLooping); 
    }

    // --- Main Logic ---
    function startApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 120, barWidth: 2, normalize: true });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });
        wsRegions.on('region-created', r => { if(wsRegions.getRegions().length > 1) wsRegions.getRegions()[0].remove(); wavesurfer.setTime(r.start); });

        document.getElementById('audioFile').onchange = e => {
            const f = e.target.files[0];
            if(f) { 
                if(currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(f);
                currentFileName = f.name;
                document.getElementById('fileBtnLabel').innerText = f.name;
                wsRegions.clearRegions();
                analyzeAudio(f); wavesurfer.load(currentObjectURL);
                renderLoopList();
            }
        };

        wavesurfer.on('ready', () => { 
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration()); 
            applySettings(); 
        });

        let lastJump = 0;
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if(r && t >= r.end && Date.now() - lastJump > 200) { 
                wavesurfer.setTime(r.start); 
                if (isSpeedUpEnabled) { 
                    const s = document.getElementById('speed'); 
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2); 
                    applySettings(); 
                }
                lastJump = Date.now();
            }
        });

        document.getElementById('playBtn').onclick = async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (wavesurfer.isPlaying()) wavesurfer.pause();
            else {
                if (isCountEnabled) {
                    const overlay = document.getElementById('countdown-overlay'); overlay.style.display = 'block';
                    const sVal = parseFloat(document.getElementById('speed').value);
                    const beat = 60000 / (originalBpm * (sVal > 0 ? sVal : 1));
                    for (let i = 1; i <= 4; i++) {
                        overlay.innerText = i;
                        const osc = audioCtx.createOscillator(); const g = audioCtx.createGain();
                        osc.frequency.value = i === 4 ? 880 : 440; 
                        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                        osc.connect(g); g.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                        await new Promise(r => setTimeout(r, beat));
                    }
                    overlay.style.display = 'none';
                }
                wavesurfer.play();
            }
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        document.getElementById('zoomSlider').oninput = e => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => { wavesurfer.zoom(0); document.getElementById('zoomSlider').value = 0; };
        
        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;
        
        window.resetSetting = (id, v) => { document.getElementById(id).value = v; applySettings(); };

        const localLoops = localStorage.getItem('ams_saved_loops_v2');
        if (localLoops) { allSavedLoops = JSON.parse(localLoops); }
        const localVideos = localStorage.getItem('ams_saved_videos');
        if (localVideos) { savedVideos = JSON.parse(localVideos); renderYTList(); }

        const userLang = (navigator.language || navigator.userLanguage).substring(0, 2);
        document.getElementById('langSelect').value = translations[userLang] ? userLang : 'en';
        changeLanguage();
    }
    startApp();
</script>
