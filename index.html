<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player Pro</title>
    
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root { --primary-color: #d4a373; --bg-dark: #121212; --panel-bg: #1e1e1e; --text-main: #e0e0e0; --text-dim: #999999; --border-color: #333333; --header-height: 60px; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: sans-serif; padding: 0; margin: 0; padding-top: var(--header-height); }
        header { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background: rgba(18,18,18,0.95); border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        #waveform-wrapper { position: relative; background: #000; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; overflow: hidden; min-height: 128px; }
        .waveform-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }
        .panel { background: var(--panel-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px; }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; }
        .val-display { color: var(--primary-color); font-weight: bold; min-width: 80px; text-align: right; font-size: 0.9rem; }
        .transport-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; }
        .btn-ctrl { background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }
        .custom-file-upload { display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; font-size: 0.8rem; text-align: center; cursor: pointer; }
        input[type="file"] { display: none; }
        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none; }
        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; flex: 1; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; }
        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; max-height: 150px; overflow-y: auto; }
        .loop-item { background: #252525; padding: 8px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .history-container { margin-top: 15px; }
        .history-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: thin; }
        .history-card { background: #252525; border: 1px solid var(--border-color); border-radius: 8px; padding: 8px; min-width: 140px; max-width: 140px; position: relative; cursor: pointer; }
        .history-title { font-size: 0.65rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-del { position: absolute; top: -5px; right: -5px; color: #ff5555; font-size: 18px; background: #121212; border-radius: 50%; }
    </style>
</head>
<body>

<header><div class="header-logo">AMS PLAYER PRO</div></header>

<div class="container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">FILE MODE</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YOUTUBE MODE</button>
    </div>

    <!-- Audio File Section -->
    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">音源ファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*">
        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>
        <div class="panel">
            <div class="row" style="justify-content: center;">
                <button class="loop-btn-main" onclick="setFileLoopPoint('start')">開始点</button>
                <div style="background:#000; padding:5px; border-radius:8px; display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustFileTime('start', -0.1)">-0.1</button>
                    <span id="fileStartTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('start', 0.1)">+0.1</button>
                </div>
                <button class="loop-btn-main" onclick="setFileLoopPoint('end')">終了点</button>
                <div style="background:#000; padding:5px; border-radius:8px; display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustFileTime('end', -0.1)">-0.1</button>
                    <span id="fileEndTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('end', 0.1)">+0.1</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap:10px;">
                <button class="tab-btn" style="border:1px solid #444;" onclick="wsRegions.clearRegions(); updateFileTimeDisplay(0,0);">クリア</button>
                <button class="tab-btn" style="border:1px solid var(--primary-color);" onclick="saveLoop('file')">保存</button>
            </div>
        </div>
        <div id="loopListFile" class="loop-list-container"></div>
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>
        <div class="panel">
            <div class="row">
                <div style="font-size:0.75rem; color:var(--text-dim); min-width:50px;">Speed</div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM ---</span>
            </div>
        </div>
    </div>

    <!-- YouTube Section -->
    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:10px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:6px;">
            <button class="loop-btn-main" onclick="loadYouTube()">LOAD</button>
        </div>
        <div id="ytPlayerContainer"><div id="player"></div></div>
        <div class="panel" style="margin-top:10px;">
            <div class="row" style="justify-content: center;">
                <button class="loop-btn-main" onclick="setLoopPoint('start')">START</button>
                <span id="loopStartTxt" class="time-display" style="min-width:60px; text-align:center;">00:00</span>
                <button class="loop-btn-main" onclick="setLoopPoint('end')">END</button>
                <span id="loopEndTxt" class="time-display" style="min-width:60px; text-align:center;">00:00</span>
                <button id="toggleLoopBtn" class="tab-btn" style="border:1px solid #444;" onclick="toggleLoop()">LOOP OFF</button>
            </div>
        </div>
        <div class="history-container">
            <div style="font-size: 0.7rem; color: var(--primary-color); margin-bottom: 5px;">RECENT HISTORY (MAX 10)</div>
            <div class="history-list" id="ytHistoryList"></div>
        </div>
        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false;
    let audioCtx = null, originalBpm = 0;
    let currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;

    // --- BPM Analyzer ---
    async function analyzeBPM(buffer) {
        const tempo = await (async () => {
            const data = buffer.getChannelData(0);
            const peaks = [];
            const threshold = 0.8;
            for (let i = 0; i < data.length; i += 100) {
                if (data[i] > threshold) peaks.push(i);
            }
            if (peaks.length < 10) return 120; // Fallback
            const intervals = [];
            for (let i = 1; i < peaks.length; i++) intervals.push(peaks[i] - peaks[i-1]);
            const avgInterval = intervals.reduce((a, b) => a + b) / intervals.length;
            const bpm = Math.round(60 / (avgInterval / buffer.sampleRate));
            return bpm > 60 && bpm < 200 ? bpm : 120;
        })();
        return tempo;
    }

    // --- Sound Logic ---
    function playBeep(isLast) {
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(isLast ? 880 : 440, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    // --- Core Logic ---
    function startApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 100, barWidth: 2 });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });

        document.getElementById('audioFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFileName = file.name;
            document.getElementById('fileSelectBtn').innerText = file.name;
            document.getElementById('loadStatus').innerText = "ANALYZING...";
            
            const arrayBuffer = await file.arrayBuffer();
            const tempCtx = new AudioContext();
            const audioBuffer = await tempCtx.decodeAudioBuffer(arrayBuffer);
            originalBpm = await analyzeBPM(audioBuffer);
            
            wavesurfer.load(URL.createObjectURL(file));
            renderLoopList('file');
            document.getElementById('loadStatus').innerText = "BPM: " + originalBpm;
            updateBpmDisplay();
        };

        const updateBpmDisplay = () => {
            const s = document.getElementById('speed').value;
            document.getElementById('spTxt').innerText = `BPM ${Math.round(originalBpm * s)} (${s}x)`;
        };
        document.getElementById('speed').oninput = updateBpmDisplay;

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) { wavesurfer.pause(); return; }
            if (isCountEnabled && originalBpm > 0) {
                const delay = 60000 / (originalBpm * document.getElementById('speed').value);
                const overlay = document.getElementById('countdown-overlay');
                overlay.style.display = 'block';
                for (let i = 1; i <= 4; i++) { 
                    overlay.innerText = i; playBeep(i === 4); 
                    await new Promise(r => setTimeout(r, delay)); 
                }
                overlay.style.display = 'none';
            }
            wavesurfer.play();
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.02).toFixed(2);
                    wavesurfer.setPlaybackRate(s.value);
                    updateBpmDisplay();
                }
            }
        });
    }

    // --- YouTube Logic ---
    window.loadYouTube = (idOrUrl) => {
        let videoId = "";
        if (idOrUrl) {
            if (idOrUrl.includes('v=')) videoId = idOrUrl.split('v=')[1].split('&')[0];
            else if (idOrUrl.includes('be/')) videoId = idOrUrl.split('be/')[1].split('?')[0];
            else videoId = idOrUrl;
        } else {
            const url = document.getElementById('ytUrl').value;
            videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.split('be/')[1]?.split('?')[0];
        }
        if (!videoId) return;
        currentYTId = videoId;
        if (ytPlayer && ytPlayer.loadVideoById) {
            ytPlayer.loadVideoById(videoId);
        } else {
            ytPlayer = new YT.Player('player', { videoId, events: { onReady: (e) => { saveToHistory(videoId, e.target.getVideoData().title); renderLoopList('yt'); }, onStateChange: onYTStateChange } });
        }
    };

    function onYTStateChange(e) {
        if (e.data == YT.PlayerState.PLAYING) {
            loopInterval = setInterval(() => { if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart); }, 100);
            const data = ytPlayer.getVideoData();
            if(data.title) saveToHistory(currentYTId, data.title);
        } else clearInterval(loopInterval);
    }

    function saveToHistory(id, title) {
        if(!title) return;
        let history = JSON.parse(localStorage.getItem('ams_yt_history_v2') || "[]");
        history = history.filter(h => h.id !== id);
        history.unshift({ id, title });
        localStorage.setItem('ams_yt_history_v2', JSON.stringify(history.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('ytHistoryList');
        const history = JSON.parse(localStorage.getItem('ams_yt_history_v2') || "[]");
        list.innerHTML = history.map(h => `
            <div class="history-card" onclick="loadYouTube('${h.id}')">
                <div class="history-title">${h.title}</div>
                <span class="material-icons history-del" onclick="event.stopPropagation(); deleteHistory('${h.id}')">cancel</span>
            </div>
        `).join('');
    }

    window.deleteHistory = (id) => {
        let history = JSON.parse(localStorage.getItem('ams_yt_history_v2') || "[]");
        localStorage.setItem('ams_yt_history_v2', JSON.stringify(history.filter(h => h.id !== id)));
        renderHistory();
    };

    // --- UI Helpers ---
    window.switchMode = (m) => {
        document.getElementById('file-section').classList.toggle('active', m === 'file');
        document.getElementById('yt-section').classList.toggle('active', m === 'yt');
        document.getElementById('tab-file').classList.toggle('active', m === 'file');
        document.getElementById('tab-yt').classList.toggle('active', m === 'yt');
        if(m === 'yt') renderHistory();
    };

    const fmt = (s) => isNaN(s) ? "00:00" : new Date(s * 1000).toISOString().substr(14, 5);
    
    window.setFileLoopPoint = (type) => {
        const now = wavesurfer.getCurrentTime();
        let r = wsRegions.getRegions()[0];
        let s = r ? r.start : now, e = r ? r.end : now + 2;
        if(type === 'start') s = now; else e = now;
        wsRegions.clearRegions();
        wsRegions.addRegion({ start: s, end: e, color: 'rgba(212, 163, 115, 0.2)' });
        updateFileTimeDisplay(s, e);
    };

    window.adjustFileTime = (type, amt) => {
        let r = wsRegions.getRegions()[0];
        if(!r) return;
        if(type === 'start') r.setOptions({ start: Math.max(0, r.start + amt) });
        else r.setOptions({ end: r.end + amt });
        updateFileTimeDisplay(r.start, r.end);
    };

    function updateFileTimeDisplay(s, e) {
        document.getElementById('fileStartTxt').innerText = fmt(s);
        document.getElementById('fileEndTxt').innerText = fmt(e);
    }

    window.toggleFeature = (t) => {
        if(t === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active'); }
        if(t === 'speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active'); }
    };

    window.setLoopPoint = (t) => {
        const now = ytPlayer.getCurrentTime();
        if(t === 'start') { loopStart = now; document.getElementById('loopStartTxt').innerText = fmt(now); }
        else { loopEnd = now; document.getElementById('loopEndTxt').innerText = fmt(now); }
    };

    window.toggleLoop = () => {
        isLooping = !isLooping;
        document.getElementById('toggleLoopBtn').innerText = isLooping ? "LOOP ON" : "LOOP OFF";
    };

    // --- Save Logic ---
    window.saveLoop = (mode) => {
        const key = mode === 'file' ? currentFileName : currentYTId;
        if(!key) return;
        let start, end;
        if(mode === 'file') { const r = wsRegions.getRegions()[0]; if(!r) return; start = r.start; end = r.end; }
        else { start = loopStart; end = loopEnd; }
        const name = prompt("Loop Name:", "Loop " + fmt(start));
        if(!name) return;
        const sKey = mode === 'file' ? 'ams_loops_f' : 'ams_loops_y';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        if(!all[key]) all[key] = [];
        all[key].push({ name, start, end });
        localStorage.setItem(sKey, JSON.stringify(all));
        renderLoopList(mode);
    };

    function renderLoopList(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const container = document.getElementById(mode === 'file' ? 'loopListFile' : 'loopListYT');
        container.innerHTML = "";
        const sKey = mode === 'file' ? 'ams_loops_f' : 'ams_loops_y';
        const all = JSON.parse(localStorage.getItem(sKey) || "{}")[key] || [];
        all.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'loop-item';
            div.innerHTML = `<span onclick="applyLoop('${mode}',${l.start},${l.end})">${l.name} (${fmt(l.start)}-${fmt(l.end)})</span>
                             <span class="material-icons" style="color:red; cursor:pointer;" onclick="deleteLoop('${mode}',${i})">delete</span>`;
            container.appendChild(div);
        });
    }

    window.applyLoop = (m, s, e) => {
        if(m === 'file') { wsRegions.clearRegions(); wsRegions.addRegion({ start: s, end: e, color: 'rgba(212, 163, 115, 0.2)' }); wavesurfer.setTime(s); updateFileTimeDisplay(s,e); }
        else { loopStart = s; loopEnd = e; ytPlayer.seekTo(s); if(!isLooping) toggleLoop(); }
    };

    window.deleteLoop = (mode, i) => {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const sKey = mode === 'file' ? 'ams_loops_f' : 'ams_loops_y';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        all[key].splice(i, 1);
        localStorage.setItem(sKey, JSON.stringify(all));
        renderLoopList(mode);
    };

    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    startApp();
</script>
</body>
</html>
