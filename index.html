<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player - Professional Edition</title>
    
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); color: var(--text-main);
            font-family: -apple-system, sans-serif; padding: 0; margin: 0; 
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }

        .header-logo { color: var(--primary-color); font-weight: bold; font-size: 0.9rem; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden; min-height: 128px;
        }
        
        .waveform-label { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; display: flex; justify-content: space-between; }
        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); }
        .val-display { color: var(--primary-color); font-weight: bold; min-width: 80px; text-align: right; }
        
        .transport-controls { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; text-align: center;
        }
        input[type="file"] { display: none; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .mode-tabs { display: flex; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; flex: 1; border-radius: 6px; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        #ytPlayerContainer { width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; background: #000; }
        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: #fff; width: 40px; height: 32px; border-radius: 4px; }
        
        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; }
        .loop-item { background: #252525; padding: 8px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; font-size: 0.8rem; }
        
        .history-container { margin-top: 15px; }
        .history-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .history-card { background: #252525; border-radius: 8px; padding: 8px; min-width: 120px; position: relative; }
        .history-title { font-size: 0.6rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-del { position: absolute; top: -5px; right: -5px; color: #ff5555; background: #000; border-radius: 50%; }
    </style>
</head>
<body>

<header><div class="header-logo">AMS PLAYER PRO</div></header>

<div class="container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube</button>
    </div>

    <!-- Audio File Section -->
    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">ファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="panel">
            <div class="row" style="justify-content: center;">
                <button class="loop-btn-main" onclick="setFileLoopPoint('start')">開始</button>
                <div style="display:flex; align-items:center; gap:5px; background:#000; padding:5px; border-radius:8px;">
                    <button class="adj-btn" onclick="adjustFileTime('start', -0.1)">-</button>
                    <span id="fileStartTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('start', 0.1)">+</button>
                </div>
                <button class="loop-btn-main" onclick="setFileLoopPoint('end')">終了</button>
                <div style="display:flex; align-items:center; gap:5px; background:#000; padding:5px; border-radius:8px;">
                    <button class="adj-btn" onclick="adjustFileTime('end', -0.1)">-</button>
                    <span id="fileEndTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('end', 0.1)">+</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap:10px;">
                <button class="tab-btn" style="border:1px solid #444" onclick="wsRegions.clearRegions()">範囲解除</button>
                <button class="tab-btn" style="border:1px solid var(--primary-color)" onclick="saveLoop('file')">保存</button>
            </div>
        </div>

        <div id="loopListFile" class="loop-list-container"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="font-size:0.7rem; color:var(--text-dim)">Speed</div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM ---</span>
            </div>
            <div class="row">
                <div style="font-size:0.7rem; color:var(--text-dim)">Pitch</div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <!-- YouTube Section -->
    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex:1; padding:10px; border-radius:6px; background:#000; border:1px solid #333; color:#fff;">
            <button class="loop-btn-main" onclick="loadYouTube()">LOAD</button>
        </div>
        <div id="ytPlayerContainer"><div id="player"></div></div>
        <div class="panel" style="margin-top:10px;">
            <div class="row" style="justify-content:center; gap:10px;">
                <button class="loop-btn-main" onclick="setLoopPoint('start')">START</button>
                <span id="loopStartTxt" class="time-display">00:00</span>
                <button class="loop-btn-main" onclick="setLoopPoint('end')">END</button>
                <span id="loopEndTxt" class="time-display">00:00</span>
            </div>
            <div class="row" style="justify-content:center;">
                <button id="toggleLoopBtn" class="tab-btn" style="border:1px solid #444" onclick="toggleLoop()">LOOP OFF</button>
                <button class="tab-btn" style="border:1px solid var(--primary-color)" onclick="saveLoop('yt')">SAVE</button>
            </div>
        </div>
        <div class="history-container" id="historyContainer">
            <div style="font-size:0.7rem; color:var(--primary-color)">RECENT HISTORY</div>
            <div class="history-list" id="ytHistoryList"></div>
        </div>
        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx = null, originalBpm = 120;
    let currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;

    // --- 高精度BPM解析 (自己相関法) ---
    async function analyzeBPM(buffer) {
        const data = buffer.getChannelData(0);
        const sampleRate = buffer.sampleRate;
        
        // 解析範囲を制限 (計算負荷軽減のため中央30秒を使用)
        const startOffset = Math.floor(buffer.duration > 40 ? 10 * sampleRate : 0);
        const length = Math.min(data.length - startOffset, 30 * sampleRate);
        const segment = data.slice(startOffset, startOffset + length);

        // 自己相関によるラグ（遅延）の計算
        // BPM 60 (1s) ～ 200 (0.3s) の範囲を探索
        const minLag = Math.floor(sampleRate * 60 / 200);
        const maxLag = Math.floor(sampleRate * 60 / 60);
        
        let bestLag = 0;
        let maxCorrelation = -Infinity;

        // ステップを間引いて粗く検索
        for (let lag = minLag; lag < maxLag; lag += 10) {
            let correlation = 0;
            for (let i = 0; i < segment.length - lag; i += 100) {
                correlation += segment[i] * segment[i + lag];
            }
            if (correlation > maxCorrelation) {
                maxCorrelation = correlation;
                bestLag = lag;
            }
        }
        
        // 付近を細かく再検索
        const fineMin = Math.max(minLag, bestLag - 10);
        const fineMax = Math.min(maxLag, bestLag + 10);
        for (let lag = fineMin; lag < fineMax; lag++) {
            let correlation = 0;
            for (let i = 0; i < segment.length - lag; i += 50) {
                correlation += segment[i] * segment[i + lag];
            }
            if (correlation > maxCorrelation) {
                maxCorrelation = correlation;
                bestLag = lag;
            }
        }

        let bpm = Math.round(60 / (bestLag / sampleRate));
        // 一般的なBPM範囲に補正
        while (bpm < 75) bpm *= 2;
        while (bpm > 180) bpm /= 2;
        return Math.round(bpm);
    }

    // --- アプリ基本機能 ---
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    window.switchMode = (mode) => {
        currentMode = mode;
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(mode + '-section').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab-' + mode));
        if (mode === 'yt') { if(wavesurfer) wavesurfer.pause(); renderHistory(); }
    };

    const fmt = (s) => {
        if (!s || isNaN(s)) return "00:00";
        const m = Math.floor(s / 60), sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    };

    // --- Audio File 制御 ---
    document.getElementById('audioFile').onchange = async e => {
        const file = e.target.files[0];
        if (!file) return;
        initAudio();
        currentFileName = file.name;
        document.getElementById('fileSelectBtn').innerText = file.name;
        document.getElementById('loadStatus').innerText = "CALCULATING BPM...";
        
        const arrayBuf = await file.arrayBuffer();
        const audioBuf = await audioCtx.decodeAudioData(arrayBuf);
        originalBpm = await analyzeBPM(audioBuf);
        
        wavesurfer.load(URL.createObjectURL(file));
        document.getElementById('loadStatus').innerText = `READY (BPM: ${originalBpm})`;
        renderLoopList('file');
    };

    window.setFileLoopPoint = (type) => {
        const now = wavesurfer.getCurrentTime();
        let r = wsRegions.getRegions()[0];
        let start = r ? r.start : now, end = r ? r.end : now + 1;
        if (type === 'start') start = now; else end = now;
        wsRegions.clearRegions();
        wsRegions.addRegion({ start, end, color: 'rgba(212, 163, 115, 0.3)' });
    };

    window.adjustFileTime = (type, amt) => {
        let r = wsRegions.getRegions()[0];
        if (!r) return;
        if (type === 'start') r.setOptions({ start: Math.max(0, r.start + amt) });
        else r.setOptions({ end: Math.min(wavesurfer.getDuration(), r.end + amt) });
    };

    // --- YouTube 制御 ---
    window.loadYouTube = (idOrUrl) => {
        let val = idOrUrl || document.getElementById('ytUrl').value;
        let id = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.includes('be/') ? val.split('be/')[1] : val;
        if (id.length > 11) id = id.substring(0, 11);
        currentYTId = id;
        if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(id);
        else ytPlayer = new YT.Player('player', { videoId: id, events: { 'onReady': (e) => saveToHistory(id, e.target.getVideoData().title) }});
        renderLoopList('yt');
    };

    function saveToHistory(id, title) {
        let h = JSON.parse(localStorage.getItem('ams_pro_history') || "[]");
        h = h.filter(x => x.id !== id);
        h.unshift({ id, title });
        localStorage.setItem('ams_pro_history', JSON.stringify(h.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('ytHistoryList');
        const h = JSON.parse(localStorage.getItem('ams_pro_history') || "[]");
        list.innerHTML = h.map(x => `
            <div class="history-card" onclick="loadYouTube('${x.id}')">
                <div class="history-title">${x.title}</div>
                <span class="material-icons history-del" onclick="event.stopPropagation(); deleteHistory('${x.id}')">cancel</span>
            </div>
        `).join('');
    }

    window.deleteHistory = (id) => {
        let h = JSON.parse(localStorage.getItem('ams_pro_history') || "[]").filter(x => x.id !== id);
        localStorage.setItem('ams_pro_history', JSON.stringify(h));
        renderHistory();
    };

    // --- ループ保存・再生 ---
    window.saveLoop = (mode) => {
        const key = mode === 'file' ? currentFileName : currentYTId;
        if (!key) return;
        let start, end;
        if (mode === 'file') { const r = wsRegions.getRegions()[0]; if(!r) return; start = r.start; end = r.end; }
        else { start = loopStart; end = loopEnd; }
        
        const name = prompt("Loop Name:", "Loop " + fmt(start));
        if (!name) return;
        const sKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        if (!all[key]) all[key] = [];
        all[key].push({ name, start, end });
        localStorage.setItem(sKey, JSON.stringify(all));
        renderLoopList(mode);
    };

    function renderLoopList(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const container = document.getElementById(mode === 'file' ? 'loopListFile' : 'loopListYT');
        container.innerHTML = "";
        const sKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        const loops = JSON.parse(localStorage.getItem(sKey) || "{}")[key] || [];
        loops.forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'loop-item';
            div.innerHTML = `<div onclick="applyLoop('${mode}', ${l.start}, ${l.end})"><b>${l.name}</b> (${fmt(l.start)}-${fmt(l.end)})</div>
                             <span class="material-icons" style="color:red" onclick="deleteLoop('${mode}', ${i})">delete</span>`;
            container.appendChild(div);
        });
    }

    window.applyLoop = (mode, s, e) => {
        if (mode === 'file') {
            wsRegions.clearRegions();
            wsRegions.addRegion({ start: s, end: e, color: 'rgba(212, 163, 115, 0.3)' });
            wavesurfer.setTime(s);
        } else {
            loopStart = s; loopEnd = e;
            document.getElementById('loopStartTxt').innerText = fmt(s);
            document.getElementById('loopEndTxt').innerText = fmt(e);
            ytPlayer.seekTo(s); if (!isLooping) toggleLoop();
        }
    };

    // --- 共通トランスポート ---
    window.toggleFeature = (t) => {
        if (t === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active'); }
        if (t === 'speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active'); }
    };

    async function playBeep(isLast) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = isLast ? 880 : 440;
        g.gain.setTargetAtTime(0.1, audioCtx.currentTime, 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function initApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#444', progressColor: var('--primary-color'), height: 100, barWidth: 2 });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());

        const applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value);
            const p = parseInt(document.getElementById('pitch').value);
            wavesurfer.setPlaybackRate(s * Math.pow(2, p / 12));
            document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * s);
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) { wavesurfer.pause(); } 
            else {
                if (isCountEnabled) {
                    const delay = 60000 / (originalBpm * document.getElementById('speed').value);
                    const ov = document.getElementById('countdown-overlay');
                    ov.style.display = 'block';
                    for(let i=1; i<=4; i++) { ov.innerText = i; playBeep(i===4); await new Promise(r => setTimeout(r, delay)); }
                    ov.style.display = 'none';
                }
                wavesurfer.play();
            }
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });

        // YouTube用Loop監視
        setInterval(() => {
            if (currentMode === 'yt' && isLooping && ytPlayer && ytPlayer.getCurrentTime) {
                if (ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart);
            }
        }, 100);
    }

    // YouTube API
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    
    window.setLoopPoint = (t) => {
        const now = ytPlayer.getCurrentTime();
        if (t === 'start') { loopStart = now; document.getElementById('loopStartTxt').innerText = fmt(now); }
        else { loopEnd = now; document.getElementById('loopEndTxt').innerText = fmt(now); }
    };

    window.toggleLoop = () => {
        isLooping = !isLooping;
        document.getElementById('toggleLoopBtn').innerText = isLooping ? "LOOP ON" : "LOOP OFF";
    };

    initApp();
</script>
</body>
</html>
