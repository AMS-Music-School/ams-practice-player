<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0; margin: 0; 
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; }
        
        #waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden; min-height: 100px;
        }
        
        .waveform-label { 
            font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 70px; text-align: right; font-size: 0.95rem; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; 
            font-size: 0.8rem; text-align: center; cursor: pointer;
        }
        input[type="file"] { display: none; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; }

        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; flex: 1; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; min-width: 80px; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        
        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; max-height: 200px; overflow-y: auto; }
        .loop-item { 
            background: #252525; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; 
            display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem;
        }
        .loop-info { flex-grow: 1; cursor: pointer; }
        .loop-name { color: var(--primary-color); font-weight: bold; margin-right: 10px; }
        .loop-times { color: var(--text-dim); font-size: 0.7rem; }
        .loop-delete { color: #ff5555; cursor: pointer; padding: 5px; }

        /* YouTube History Styles */
        .history-container { margin-top: 15px; display: none; }
        .history-list { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .history-card { 
            background: #252525; border: 1px solid var(--border-color); border-radius: 8px; 
            padding: 8px; min-width: 150px; max-width: 150px; position: relative; cursor: pointer;
        }
        .history-title { font-size: 0.7rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .history-del { position: absolute; top: 2px; right: 2px; color: #ff5555; font-size: 16px; background: rgba(0,0,0,0.5); border-radius: 50%; }

        .clear-btn-ja { background: #333; border: none; color: var(--text-main); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<header><div class="header-logo">AMS PLAYER</div></header>

<div class="container">
    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <!-- Audio File Section -->
    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">ファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="panel" style="margin-bottom:10px;">
            <div class="row" style="justify-content: center; gap: 10px;">
                <button class="loop-btn-main" onclick="setFileLoopPoint('start')">開始位置</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustFileTime('start', -1)">-1s</button>
                    <button class="adj-btn" onclick="adjustFileTime('start', -0.1)">-0.1</button>
                    <span id="fileStartTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('start', 0.1)">+0.1</button>
                    <button class="adj-btn" onclick="adjustFileTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px;">
                <button class="loop-btn-main" onclick="setFileLoopPoint('end')">終了位置</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustFileTime('end', -1)">-1s</button>
                    <button class="adj-btn" onclick="adjustFileTime('end', -0.1)">-0.1</button>
                    <span id="fileEndTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustFileTime('end', 0.1)">+0.1</button>
                    <button class="adj-btn" onclick="adjustFileTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px; margin-top:5px;">
                <button class="clear-btn-ja" onclick="clearFileRegion()">
                    <span class="material-icons" style="font-size:16px;">layers_clear</span> 範囲解除
                </button>
                <button class="clear-btn-ja" onclick="saveLoop('file')" style="border: 1px solid var(--primary-color);">
                    <span class="material-icons" style="font-size:16px;">bookmark_add</span> ループ保存
                </button>
            </div>
        </div>
        <div id="loopListFile" class="loop-list-container"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')"><span class="material-icons">timer</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')"><span class="material-icons">speed</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM 120</span>
            </div>
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <!-- YouTube Section -->
    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:10px;">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:10px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:6px;">
            <button class="loop-btn-main" onclick="loadYouTube()">LOAD</button>
        </div>
        
        <div id="ytPlayerContainer"><div id="player"></div></div>
        
        <div class="panel" style="margin-top:15px;">
            <div class="row" style="justify-content: center; gap: 10px;">
                <button class="loop-btn-main" onclick="setLoopPoint('start')">SET START</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('start', -1)">-1s</button>
                    <button class="adj-btn" onclick="adjustTime('start', -0.1)">-0.1</button>
                    <span id="loopStartTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('start', 0.1)">+0.1</button>
                    <button class="adj-btn" onclick="adjustTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px;">
                <button class="loop-btn-main" onclick="setLoopPoint('end')">SET END</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('end', -1)">-1s</button>
                    <button class="adj-btn" onclick="adjustTime('end', -0.1)">-0.1</button>
                    <span id="loopEndTxt" class="time-display" style="min-width:55px; text-align:center;">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('end', 0.1)">+0.1</button>
                    <button class="adj-btn" onclick="adjustTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px;">
                <button id="toggleLoopBtn" class="tab-btn" style="border:1px solid var(--border-color); max-width:120px;" onclick="toggleLoop()">LOOP OFF</button>
                <button class="clear-btn-ja" onclick="saveLoop('yt')" style="border: 1px solid var(--primary-color);">SAVE LOOP</button>
            </div>
        </div>

        <div class="history-container" id="historyContainer">
            <div style="font-size: 0.75rem; color: var(--primary-color); margin-bottom: 5px;">RECENT VIDEOS</div>
            <div class="history-list" id="ytHistoryList"></div>
        </div>

        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx, firstSoundTime = 0, originalBpm = 120;
    let currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;

    // --- Audio File Loop Logic ---
    window.setFileLoopPoint = (type) => {
        if (!wavesurfer) return;
        const now = wavesurfer.getCurrentTime();
        const duration = wavesurfer.getDuration();
        let region = wsRegions.getRegions()[0];
        let start = region ? region.start : now;
        let end = region ? region.end : Math.min(now + 2, duration);

        if (type === 'start') start = now; else end = now;
        if (start >= end) end = Math.min(start + 0.1, duration);
        
        wsRegions.clearRegions();
        wsRegions.addRegion({ id: 'loop', start, end, color: 'rgba(212, 163, 115, 0.2)', drag: true, resize: true });
        updateFileTimeDisplay(start, end);
        wavesurfer.setTime(start); // ジャンプ
    };

    window.adjustFileTime = (type, amount) => {
        if (!wavesurfer) return;
        let region = wsRegions.getRegions()[0];
        if (!region) return;
        let ns = region.start, ne = region.end;
        if (type === 'start') { ns = Math.max(0, ns + amount); if (ns >= ne) ns = ne - 0.1; region.setOptions({ start: ns }); wavesurfer.setTime(ns); } 
        else { ne = Math.min(wavesurfer.getDuration(), ne + amount); if (ne <= ns) ne = ns + 0.1; region.setOptions({ end: ne }); wavesurfer.setTime(ne); }
        updateFileTimeDisplay(region.start, region.end);
    };

    function updateFileTimeDisplay(s, e) {
        document.getElementById('fileStartTxt').innerText = fmt(s);
        document.getElementById('fileEndTxt').innerText = fmt(e);
    }

    window.clearFileRegion = () => {
        wsRegions.clearRegions();
        updateFileTimeDisplay(0, 0);
    };

    // --- YouTube Logic ---
    function loadYouTube(urlInput = null) {
        const url = urlInput || document.getElementById('ytUrl').value;
        const videoId = url.includes('v=') ? url.split('v=')[1].split('&')[0] : url.includes('be/') ? url.split('be/')[1].split('?')[0] : null;
        if (videoId) {
            currentYTId = videoId;
            if (ytPlayer && ytPlayer.loadVideoById) ytPlayer.loadVideoById(videoId);
            else ytPlayer = new YT.Player('player', { videoId: videoId, events: { 'onReady': onPlayerReady, 'onStateChange': onPlayerStateChange } });
            renderLoopList('yt');
        }
    }

    function onPlayerReady(event) {
        const data = event.target.getVideoData();
        if (data && data.title) saveToHistory(currentYTId, data.title);
        renderLoopList('yt');
    }

    function onPlayerStateChange(e) {
        if (e.data == YT.PlayerState.PLAYING) {
            loopInterval = setInterval(() => { if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart); }, 100);
        } else clearInterval(loopInterval);
    }

    window.setLoopPoint = (t) => {
        const now = ytPlayer.getCurrentTime();
        if (t === 'start') { loopStart = now; document.getElementById('loopStartTxt').innerText = fmt(loopStart); ytPlayer.seekTo(loopStart); }
        else { loopEnd = now; document.getElementById('loopEndTxt').innerText = fmt(loopEnd); ytPlayer.seekTo(loopEnd); }
    };

    window.adjustTime = (t, a) => {
        if (t === 'start') { loopStart = Math.max(0, loopStart + a); document.getElementById('loopStartTxt').innerText = fmt(loopStart); ytPlayer.seekTo(loopStart); }
        else { loopEnd = Math.max(loopStart + 0.1, loopEnd + a); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); ytPlayer.seekTo(loopEnd); }
    };

    // --- Storage Logic ---
    function saveToHistory(id, title) {
        let history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        history = history.filter(h => h.id !== id);
        history.unshift({ id, title });
        localStorage.setItem('ams_yt_history', JSON.stringify(history.slice(0, 10)));
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('ytHistoryList');
        const container = document.getElementById('historyContainer');
        const history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        if (history.length === 0) { container.style.display = 'none'; return; }
        container.style.display = 'block';
        list.innerHTML = history.map(h => `
            <div class="history-card" onclick="loadYouTube('https://www.youtube.com/watch?v=${h.id}')">
                <div class="history-title">${h.title}</div>
                <span class="material-icons history-del" onclick="event.stopPropagation(); deleteHistory('${h.id}')">close</span>
            </div>
        `).join('');
    }

    window.deleteHistory = (id) => {
        let history = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        localStorage.setItem('ams_yt_history', JSON.stringify(history.filter(h => h.id !== id)));
        renderHistory();
    };

    window.saveLoop = (mode) => {
        let start, end, key = mode === 'file' ? currentFileName : currentYTId;
        if (!key) return;
        if (mode === 'file') {
            const r = wsRegions.getRegions()[0]; if (!r) return; start = r.start; end = r.end;
        } else { start = loopStart; end = loopEnd; }
        const name = prompt("Name this loop:", "Loop " + fmt(start));
        if (!name) return;
        const sKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        if (!all[key]) all[key] = [];
        all[key].push({ name, start, end });
        localStorage.setItem(sKey, JSON.stringify(all));
        renderLoopList(mode);
    };

    function renderLoopList(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const container = mode === 'file' ? document.getElementById('loopListFile') : document.getElementById('loopListYT');
        container.innerHTML = "";
        if (!key) return;
        const sKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        (all[key] || []).forEach((l, i) => {
            const div = document.createElement('div');
            div.className = 'loop-item';
            div.innerHTML = `
                <div class="loop-info" onclick="applyLoop('${mode}', ${l.start}, ${l.end})">
                    <span class="loop-name">${l.name}</span><span class="loop-times">${fmt(l.start)}-${fmt(l.end)}</span>
                </div>
                <span class="material-icons loop-delete" onclick="deleteLoop('${mode}', ${i})">delete</span>
            `;
            container.appendChild(div);
        });
    }

    window.deleteLoop = (mode, index) => {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const sKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(sKey) || "{}");
        if (all[key]) { all[key].splice(index, 1); localStorage.setItem(sKey, JSON.stringify(all)); renderLoopList(mode); }
    };

    window.applyLoop = (mode, s, e) => {
        if (mode === 'file') {
            wsRegions.clearRegions();
            wsRegions.addRegion({ start: s, end: e, color: 'rgba(212, 163, 115, 0.2)' });
            wavesurfer.setTime(s); updateFileTimeDisplay(s, e);
        } else {
            loopStart = s; loopEnd = e;
            document.getElementById('loopStartTxt').innerText = fmt(s);
            document.getElementById('loopEndTxt').innerText = fmt(e);
            ytPlayer.seekTo(s); if (!isLooping) toggleLoop();
        }
    };

    // --- Common Functions ---
    window.toggleFeature = (type) => {
        if (type === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled); }
        else if (type === 'speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled); }
    };

    window.switchMode = (mode) => {
        currentMode = mode;
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-yt').classList.toggle('active', mode === 'yt');
        if(mode === 'yt' && wavesurfer) wavesurfer.pause();
        if(mode === 'file' && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
        if(mode === 'yt') renderHistory();
    };

    const fmt = (s) => {
        if (!s || isNaN(s)) return "00:00";
        const m = Math.floor(s / 60), sec = (s % 60).toFixed(1);
        return `${m.toString().padStart(2, '0')}:${sec.padStart(4, '0')}`;
    };

    function startApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 100, barWidth: 2, cursorColor: '#fff' });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });

        wsRegions.on('region-updated', r => updateFileTimeDisplay(r.start, r.end));
        wsRegions.on('region-created', r => { 
            if(wsRegions.getRegions().length > 1) wsRegions.getRegions()[0].remove(); 
            updateFileTimeDisplay(r.start, r.end); 
            wavesurfer.setTime(r.start); // ドラッグ完了後に開始地点へジャンプ
        });

        document.getElementById('audioFile').onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                currentFileName = file.name;
                document.getElementById('fileSelectBtn').innerText = file.name;
                wavesurfer.load(URL.createObjectURL(file));
                renderLoopList('file');
                // Simple BPM/Start Analysis
                document.getElementById('loadStatus').innerText = "ANALYZING...";
                const ctx = new AudioContext();
                const buffer = await ctx.decodeAudioData(await file.arrayBuffer());
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) { if (Math.abs(data[i]) > 0.015) { firstSoundTime = i / buffer.sampleRate; break; } }
                document.getElementById('loadStatus').innerText = "READY";
                ctx.close();
            }
        };

        const applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value), p = parseInt(document.getElementById('pitch').value);
            const media = wavesurfer.getMediaElement();
            if (media) { media.preservesPitch = (p === 0); wavesurfer.setPlaybackRate(s * Math.pow(2, p / 12)); }
            document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * s);
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        wavesurfer.on('ready', () => { document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration()); applySettings(); });
        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) wavesurfer.pause();
            else {
                if (isCountEnabled) {
                    const delay = 60000 / (originalBpm * parseFloat(document.getElementById('speed').value));
                    const overlay = document.getElementById('countdown-overlay');
                    overlay.style.display = 'block';
                    for (let i = 1; i <= 4; i++) { overlay.innerText = i; await new Promise(r => setTimeout(r, delay)); }
                    overlay.style.display = 'none';
                }
                wavesurfer.play();
            }
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) {
                    const s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });

        window.toggleLoop = () => {
            isLooping = !isLooping;
            const b = document.getElementById('toggleLoopBtn');
            b.innerText = isLooping ? "LOOP ON" : "LOOP OFF";
            b.classList.toggle('active', isLooping);
        };
        
        window.resetSetting = (id, val) => { document.getElementById(id).value = val; applySettings(); };
    }

    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    startApp();
</script>
</body>
</html>
