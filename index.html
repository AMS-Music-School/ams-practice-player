<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="apple-touch-icon" href="icon.png">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/timeline.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            padding: 0; 
            margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(18, 18, 18, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 2px; font-size: 1rem; }
        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -300px; width: 300px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px;
        }
        .side-menu.open { right: 0; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2500; display: none; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .title-area { text-align: center; margin-bottom: 25px; }
        .title-area h2 { color: var(--primary-color); font-size: 1.1rem; letter-spacing: 6px; margin: 0; text-transform: uppercase; }

        .mode-tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 25px; background: var(--panel-bg); padding: 4px; border-radius: 12px; border: 1px solid var(--border-color); max-width: 600px; margin: 0 auto 25px auto; }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 10px; cursor: pointer; border-radius: 8px; font-size: 0.85em; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        #waveform-wrapper { position: relative; background: #000; border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 10px; overflow: hidden; touch-action: none; }
        
        .waveform-label { font-size: 0.8em; color: var(--text-dim); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; letter-spacing: 1px; flex-wrap: wrap; gap: 10px; }
        .time-display { font-family: "Courier New", Courier, monospace; color: var(--primary-color); font-weight: bold; font-size: 1.3em; }

        .panel { background: var(--panel-bg); padding: 22px; border-radius: 16px; border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); cursor: pointer; height: 6px; border-radius: 3px; background: #444; -webkit-appearance: none; }
        .val-display { color: var(--primary-color); font-weight: bold; min-width: 65px; text-align: right; font-size: 1.2em; }
        
        .transport-controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin: 25px 0; }
        .btn-ctrl { background: var(--panel-bg); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 50%; width: 55px; height: 55px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .play-main { background: var(--primary-color); color: #121212; border: none; width: 75px; height: 75px; }

        .practice-settings { background: var(--panel-bg); border: 1px solid var(--border-color); padding: 15px; margin-bottom: 20px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-around; }
        .num-input { width: 60px; background: #000; color: var(--primary-color); border: 1px solid var(--border-color); padding: 6px; border-radius: 6px; text-align: center; font-weight: bold; }

        input[type="file"] { width: 100%; padding: 18px; border: 2px dashed var(--border-color); border-radius: 12px; margin-bottom: 20px; color: var(--text-dim); background: #181818; }

        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: var(--primary-color); font-weight: bold; z-index: 1000; display: none; pointer-events: none; }

        .reset-btn { background: #333; border: none; color: var(--text-dim); padding: 4px 10px; border-radius: 4px; font-size: 0.7em; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)"><span class="material-icons">menu</span></button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border-color); padding-bottom:15px; margin-bottom:20px;">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)"><span class="material-icons">close</span></button>
    </div>
    <div style="color:var(--text-dim); font-size:0.9em; line-height:1.6;">
        PC: マウスホイールで波形ズーム<br>
        Mobile: 二本指ピンチで波形ズーム
    </div>
</div>

<div class="container">
    <div class="title-area"><h2>AMS Practice Player</h2></div>

    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <input type="file" id="audioFile" accept="audio/*">

        <div class="practice-settings">
            <label><input type="checkbox" id="enableCountdown" checked> カウント</label>
            <label>BPM: <input type="number" id="bpmInput" class="num-input" value="120"></label>
            <label><input type="checkbox" id="autoSpeedUp"> 自動加速</label>
        </div>

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="10" max="500" value="50" style="width:100px;">
                <button class="reset-btn" id="resetZoomBtn">Reset</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
            <div id="timeline"></div>
        </div>

        <div style="text-align:center; margin-bottom:10px;">
            <button class="reset-btn" style="padding:8px 16px; font-size:0.8em;" onclick="wsRegions.clearRegions()">範囲解除</button>
        </div>
        
        <div class="transport-controls">
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:45px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
        </div>

        <div class="panel">
            <div class="row">
                <span>Speed</span>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">1.00x</span>
            </div>
            <div class="row">
                <span>Pitch</span>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <div id="yt-section" class="content-section">
        <p style="text-align:center; color:var(--text-dim);">YouTubeモードは現在準備中です</p>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, audioCtx, firstSoundTime = 0, originalBpm = 120, currentObjectURL = null;

    function toggleMenu(isOpen) {
        document.getElementById('sideMenu').classList.toggle('open', isOpen);
        document.getElementById('menuOverlay').style.display = isOpen ? 'block' : 'none';
    }

    function switchMode(mode) {
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
    }

    const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    function startApp() {
        wavesurfer = WaveSurfer.create({ 
            container: '#waveform', 
            waveColor: '#444', 
            progressColor: '#d4a373', 
            height: 120, 
            minPxPerSec: 50,
            autoCenter: true,
            hideScrollbar: false
        });

        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.3)' });
        
        wavesurfer.registerPlugin(WaveSurfer.Timeline.create({ container: '#timeline' }));

        // --- ズームとタイムラインの完全同期ロジック ---
        const zoomSlider = document.getElementById('zoomSlider');
        const executeZoom = (level) => {
            const val = Math.max(10, Math.min(500, level));
            zoomSlider.value = val;
            wavesurfer.zoom(val);
            
            // ズーム直後にタイムラインコンテナを再描画領域に合わせる
            setTimeout(() => {
                const scrollWidth = wavesurfer.getWrapper().scrollWidth;
                const tl = document.getElementById('timeline');
                if (tl && tl.firstChild) {
                    tl.firstChild.style.width = scrollWidth + 'px';
                }
            }, 10);
        };

        zoomSlider.oninput = (e) => executeZoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => executeZoom(50);

        // PCホイール
        document.getElementById('waveform').addEventListener('wheel', (e) => {
            e.preventDefault();
            let newZoom = Number(zoomSlider.value) + (e.deltaY > 0 ? -15 : 15);
            executeZoom(newZoom);
        }, { passive: false });

        // モバイルピンチ
        let lastDiff = -1;
        document.getElementById('waveform').addEventListener('touchmove', (e) => {
            if (e.touches.length === 2) {
                e.preventDefault();
                let curDiff = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                if (lastDiff > 0) {
                    executeZoom(Number(zoomSlider.value) + (curDiff - lastDiff) * 0.5);
                }
                lastDiff = curDiff;
            }
        }, { passive: false });
        document.getElementById('waveform').addEventListener('touchend', () => { lastDiff = -1; });

        // ファイル読み込み
        document.getElementById('audioFile').onchange = e => {
            const file = e.target.files[0];
            if (file) {
                if (currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(file);
                wavesurfer.load(currentObjectURL);
                document.getElementById('loadStatus').innerText = "LOADING...";
            }
        };

        wavesurfer.on('ready', () => {
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration());
            document.getElementById('loadStatus').innerText = "COMPLETE";
            executeZoom(50); // 初期描画
        });

        wavesurfer.on('timeupdate', (t) => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if (r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (document.getElementById('autoSpeedUp').checked) {
                    let s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2);
                    applySettings();
                }
            }
        });

        const applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value);
            wavesurfer.setPlaybackRate(s);
            document.getElementById('spTxt').innerText = s.toFixed(2) + "x";
        };
        document.getElementById('speed').oninput = applySettings;

        document.getElementById('playBtn').onclick = async () => {
            if (wavesurfer.isPlaying()) {
                wavesurfer.pause();
            } else {
                if (document.getElementById('enableCountdown').checked) {
                    const overlay = document.getElementById('countdown-overlay');
                    overlay.style.display = 'block';
                    for (let i = 4; i > 0; i--) {
                        overlay.innerText = i;
                        await new Promise(r => setTimeout(r, 500));
                    }
                    overlay.style.display = 'none';
                }
                wavesurfer.play();
            }
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
    }

    startApp();
</script>
</body>
</html>
