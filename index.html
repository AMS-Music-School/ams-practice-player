<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png?v=1.0.3" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.3">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            padding: 0; 
            margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-height);
            background: rgba(18, 18, 18, 0.95);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 2000;
            backdrop-filter: blur(10px);
        }

        .header-logo {
            color: var(--primary-color);
            font-weight: bold;
            letter-spacing: 2px;
            font-size: 1rem;
        }

        .menu-trigger {
            background: none;
            border: none;
            color: var(--text-main);
            cursor: pointer;
            padding: 5px;
        }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 300px;
            height: 100%;
            background: var(--panel-bg);
            z-index: 3000;
            transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5);
            padding: 20px;
        }

        .side-menu.open { right: 0; }

        .menu-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 2500;
            display: none;
        }

        .menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-main);
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95em;
        }

        .menu-item:hover { background: #333; }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 500px;
            background: var(--panel-bg);
            border: 1px solid var(--primary-color);
            border-radius: 16px;
            z-index: 4000;
            padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .container { 
            width: 100%; 
            max-width: 1200px; 
            margin: 0 auto; 
            background: var(--bg-dark); 
            padding: 20px 20px 40px 20px;
        }
        
        .title-area { text-align: center; margin-bottom: 25px; }
        .title-area h2 { 
            color: var(--primary-color); 
            font-size: 1.1rem; 
            letter-spacing: 6px; 
            margin: 0; 
            font-weight: bold; 
            text-transform: uppercase; 
        }

        .mode-tabs { 
            display: flex; 
            justify-content: center; 
            gap: 5px; 
            margin-bottom: 25px; 
            background: var(--panel-bg); 
            padding: 4px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            max-width: 600px; 
            margin-left: auto;
            margin-right: auto;
        }
        .tab-btn { 
            background: transparent; 
            border: none; 
            color: var(--text-dim); 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-size: 0.85em; 
            flex: 1;
            transition: all 0.3s ease; 
        }
        .tab-btn.active { 
            background: var(--primary-color); 
            color: #121212; 
            font-weight: bold; 
        }

        .content-section { display: none; }
        .content-section.active { display: block; }

        #waveform-wrapper { 
            position: relative; 
            background: #000; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            margin-bottom: 10px; 
            overflow: hidden;
            touch-action: none;
        }
        
        .waveform-label { 
            font-size: 0.8em; 
            color: var(--text-dim); 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            letter-spacing: 1px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .time-display { 
            font-family: "Courier New", Courier, monospace; 
            color: var(--primary-color); 
            font-weight: bold; 
            font-size: 1.3em;
            background: transparent;
            padding: 0;
        }

        .panel { 
            background: var(--panel-bg); 
            padding: 22px; 
            border-radius: 16px; 
            border: 1px solid var(--border-color); 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 15px; }

        input[type="range"] { 
            flex-grow: 1; 
            accent-color: var(--primary-color); 
            cursor: pointer; 
            height: 6px;
            border-radius: 3px;
            background: #444;
            -webkit-appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary-color);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 90px; text-align: right; font-size: 1.2em; }
        
        .transport-controls { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 20px; 
            margin: 25px 0; 
            background: transparent;
            padding: 0;
        }
        .btn-ctrl { 
            background: var(--panel-bg); 
            color: var(--text-dim); 
            border: 1px solid var(--border-color); 
            border-radius: 50%; 
            width: 55px; 
            height: 55px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
        }
        .btn-ctrl.active {
            color: var(--primary-color);
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(212, 163, 115, 0.3);
        }
        .play-main { 
            background: var(--primary-color); 
            color: #121212; 
            border: none; 
            width: 75px; 
            height: 75px; 
            color: #121212 !important;
        }

        .reset-btn { 
            background: #333; 
            border: none; 
            color: var(--text-dim); 
            padding: 4px 10px; 
            border-radius: 4px; 
            font-size: 0.7em; 
            cursor: pointer; 
            margin-left: 5px;
        }
        
        input[type="file"] { 
            width: 100%; 
            padding: 18px; 
            border: 2px dashed var(--border-color); 
            border-radius: 12px; 
            margin-bottom: 20px; 
            color: var(--text-dim); 
            background: #181818;
            font-size: 0.9em;
        }

        .clear-btn-ja { 
            background: #333; 
            border: none; 
            color: var(--text-main); 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 0.8em; 
            cursor: pointer;
        }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 120px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; pointer-events: none; text-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        #ytPlayerContainer { 
            position: relative; width: 100%; max-width: 900px; margin: 0 auto; aspect-ratio: 16 / 9; 
            border-radius: 12px; overflow: hidden; border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); background: #000;
        }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)">
            <span class="material-icons">close</span>
        </button>
    </div>
    <div class="menu-item" onclick="showGuide('file')"><span class="material-icons">description</span> Audio Fileモード ガイド</div>
</div>

<div id="guideModalFile" class="modal">
    <div class="guide-box-inner">
        <b>【Audio File Mode】ガイド</b>
        <ul>
            <li><b>カウントロゴ:</b> 再生ボタン左。タップでカウント予備動作をON/OFFします。</li>
            <li><b>加速ロゴ:</b> 再生ボタン右。タップするとループの度に5%ずつ自動加速します。</li>
            <li><b>Pitch:</b> 音程を変更できます。Speedと独立して動作します。</li>
        </ul>
    </div>
    <button class="clear-btn-ja" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div class="container">
    <div class="title-area"><h2>AMS Practice Player</h2></div>

    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="0" max="500" value="100" style="width:120px;">
                <button class="reset-btn" id="resetZoomBtn">全体表示</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
            <span style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:16px;">volume_up</span>
                <input type="range" id="modelVol" min="0" max="1" step="0.05" value="0.8" style="width:70px;">
            </span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="clear-btn-container" style="text-align:center; margin-bottom:10px;">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()">範囲解除</button>
        </div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')">
                <span class="material-icons">timer</span>
            </button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:45px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')">
                <span class="material-icons">speed</span>
            </button>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:85px; font-weight:bold; color:var(--text-dim); font-size:0.9em;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="bpmDisplay" class="val-display">BPM 120</span>
            </div>
            <div class="row">
                <div style="min-width:85px; font-weight:bold; color:var(--text-dim); font-size:0.9em;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <div id="yt-section" class="content-section">
        <div class="yt-input-area" style="text-align:center; margin-bottom:20px;">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="width:70%; padding:12px; border-radius:8px; border:1px solid #333; background:#000; color:#fff;">
            <button class="tab-btn active" style="padding:12px 20px;" onclick="loadYouTube()">LOAD</button>
        </div>
        <div id="ytPlayerContainer"><div id="player"></div></div>
    </div>
</div>

<script>
    let wavesurfer, wsRegions, isCountEnabled = true, isSpeedUpEnabled = false;
    let audioCtx, firstSoundTime = 0, originalBpm = 120, currentObjectURL = null;

    function toggleMenu(isOpen) {
        document.getElementById('sideMenu').classList.toggle('open', isOpen);
        document.getElementById('menuOverlay').style.display = isOpen ? 'block' : 'none';
    }

    function showGuide(type) {
        toggleMenu(false); closeModals();
        if (type === 'file') document.getElementById('guideModalFile').style.display = 'block';
        document.getElementById('menuOverlay').style.display = 'block';
    }

    function closeModals() {
        document.getElementById('guideModalFile').style.display = 'none';
        document.getElementById('menuOverlay').style.display = 'none';
    }

    function switchMode(mode) {
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
    }

    // カウント・加速機能のトグル
    function toggleFeature(type) {
        if (type === 'count') {
            isCountEnabled = !isCountEnabled;
            document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled);
        } else if (type === 'speedup') {
            isSpeedUpEnabled = !isSpeedUpEnabled;
            document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled);
        }
    }

    async function analyzeAudio(file) {
        document.getElementById('loadStatus').innerText = "ANALYZING...";
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            const data = audioBuffer.getChannelData(0);
            let skip = 0;
            for (let i = 0; i < data.length; i++) { if (Math.abs(data[i]) > 0.015) { skip = i / audioBuffer.sampleRate; break; } }
            firstSoundTime = skip;
            originalBpm = Math.round(detectBPM(audioBuffer) || 120);
            document.getElementById('loadStatus').innerText = "COMPLETE";
            applySettings();
        } catch (e) { document.getElementById('loadStatus').innerText = "READY"; } finally { tempCtx.close(); }
    }

    function detectBPM(buffer) {
        const data = buffer.getChannelData(0), step = 200, energy = [];
        for (let i = 0; i < data.length; i += step) {
            let sum = 0; for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j] * data[i+j];
            energy.push(Math.sqrt(sum/step));
        }
        let bestBpm = 120, maxCorrelation = 0;
        for (let interval = 40; interval <= 150; interval++) {
            let correlation = 0; for (let i = 0; i < Math.min(energy.length - interval, 5000); i++) correlation += energy[i] * energy[i + interval];
            if (correlation > maxCorrelation) { maxCorrelation = correlation; bestBpm = 60 / (interval * step / buffer.sampleRate); }
        }
        if (bestBpm > 180) bestBpm /= 2; if (bestBpm < 70) bestBpm *= 2;
        return bestBpm;
    }

    function playBeep(isLast) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(isLast ? 880 : 440, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    async function runCountdown() {
        if (!isCountEnabled) return;
        const bpm = Math.round(originalBpm * parseFloat(document.getElementById('speed').value));
        const interval = 60000 / bpm, overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'block';
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i; playBeep(i === 4);
            await new Promise(r => setTimeout(r, interval));
        }
        overlay.style.display = 'none';
    }

    const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;

    function startApp() {
        wavesurfer = WaveSurfer.create({ 
            container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 150, barWidth: 2, normalize: true, autoCenter: true
        });
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });
        wsRegions.on('region-created', r => { if(wsRegions.getRegions().length > 1) wsRegions.getRegions()[0].remove(); wavesurfer.setTime(r.start); });

        const zoomSlider = document.getElementById('zoomSlider');
        zoomSlider.oninput = (e) => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => { zoomSlider.value = 0; wavesurfer.zoom(0); };

        document.getElementById('audioFile').onchange = e => { 
            const file = e.target.files[0];
            if(file) { 
                if(currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                currentObjectURL = URL.createObjectURL(file);
                analyzeAudio(file); wavesurfer.load(currentObjectURL);
            } 
        };
        
        wavesurfer.on('ready', () => { 
            document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration()); 
            applySettings(); 
            if(firstSoundTime > 0) wavesurfer.setTime(firstSoundTime);
        });

        // Speed & Pitch (Detune) 適用ロジック
        window.applySettings = () => {
            const s = parseFloat(document.getElementById('speed').value);
            const p = parseInt(document.getElementById('pitch').value);
            const media = wavesurfer.getMediaElement();
            if (media) {
                media.preservesPitch = true;
                if (media.detune !== undefined) {
                    media.detune = p * 100; // Pitch機能の核
                    wavesurfer.setPlaybackRate(s);
                } else {
                    // 非対応環境へのフォールバック
                    media.preservesPitch = false;
                    wavesurfer.setPlaybackRate(s * Math.pow(2, p / 12));
                }
            }
            document.getElementById('bpmDisplay').innerText = "BPM " + Math.round(originalBpm * s);
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        document.getElementById('speed').oninput = applySettings;
        document.getElementById('pitch').oninput = applySettings;
        document.getElementById('modelVol').oninput = e => wavesurfer.setVolume(e.target.value);

        document.getElementById('playBtn').onclick = async () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (wavesurfer.isPlaying()) { wavesurfer.pause(); }
            else {
                const current = wavesurfer.getCurrentTime(), region = wsRegions.getRegions()[0];
                if (isCountEnabled) {
                    if (region && (current < region.start || current >= region.end)) wavesurfer.setTime(region.start);
                    else if (!region && current < firstSoundTime) wavesurfer.setTime(firstSoundTime);
                }
                await runCountdown();
                wavesurfer.play();
            }
        };

        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        
        let lastJump = 0;
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if(r && t >= r.end && Date.now() - lastJump > 200) { 
                wavesurfer.setTime(r.start); lastJump = Date.now(); 
                if(isSpeedUpEnabled) {
                    let s = document.getElementById('speed');
                    s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2); 
                    applySettings();
                }
            }
        });

        window.resetSetting = (id, val) => { document.getElementById(id).value = val; applySettings(); };
    }
    startApp();
</script>
</body>
</html>
