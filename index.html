<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AMS Practice Player</title>
    
    <meta name="apple-mobile-web-app-title" content="AMS Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <link rel="icon" href="icon.png?v=1.0.6" type="image/png">
    <link rel="apple-touch-icon" href="icon.png?v=1.0.6">

    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <script src="https://unpkg.com/wavesurfer.js@7/dist/plugins/regions.min.js"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #d4a373;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #e0e0e0;
            --text-dim: #999999;
            --border-color: #333333;
            --header-height: 60px;
            --recording-red: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 0; margin: 0; 
            overscroll-behavior-y: contain;
            padding-top: var(--header-height);
        }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: rgba(18, 18, 18, 0.95); border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; padding: 0 15px;
            z-index: 2000; backdrop-filter: blur(10px);
        }

        .header-logo { color: var(--primary-color); font-weight: bold; letter-spacing: 1px; font-size: 0.9rem; }

        .container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 10px; padding-bottom: 40px; }
        
        #waveform-wrapper, #rec-waveform-wrapper { 
            position: relative; background: #000; border: 1px solid var(--border-color); 
            border-radius: 8px; margin-bottom: 10px; overflow: hidden;
            min-height: 120px;
        }
        
        #rec-waveform-wrapper {
            min-height: 80px;
            margin-top: 10px;
            display: none; /* 録音がある時だけ表示 */
            border-color: var(--recording-red);
        }

        .waveform-label { 
            font-size: 0.75rem; color: var(--text-dim); margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 5px;
        }

        .time-display { color: var(--primary-color); font-weight: bold; font-size: 1rem; }

        .panel { 
            background: var(--panel-bg); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 12px;
            margin-bottom: 15px;
        }

        .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }

        input[type="range"] { flex-grow: 1; accent-color: var(--primary-color); height: 6px; min-width: 50px; }

        .val-display { color: var(--primary-color); font-weight: bold; min-width: 70px; text-align: right; font-size: 0.95rem; }
        
        .transport-controls { 
            display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; 
        }
        .btn-ctrl { 
            background: var(--panel-bg); color: var(--text-dim); border: 1px solid var(--border-color); 
            border-radius: 50%; width: 48px; height: 48px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-ctrl.active { color: var(--primary-color); border-color: var(--primary-color); }
        .play-main { background: var(--primary-color); color: #121212 !important; width: 60px; height: 60px; border: none; }
        
        /* 録音ボタン専用スタイル */
        .rec-btn { color: var(--recording-red); border-color: #442222; }
        .rec-btn.recording { background: var(--recording-red); color: white; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .custom-file-upload {
            display: block; width: 100%; padding: 12px; border: 2px dashed var(--border-color); 
            border-radius: 10px; margin-bottom: 12px; background: #181818; color: #888; 
            font-size: 0.8rem; text-align: center; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        input[type="file"] { display: none; }

        #countdown-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            font-size: 80px; color: var(--primary-color); font-weight: bold; z-index: 1000; 
            display: none; text-shadow: 0 0 20px rgba(0,0,0,0.8); pointer-events: none;
        }

        .reset-btn { background: #333; border: none; color: #999; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; cursor: pointer; }
        .menu-trigger { background: none; border: none; color: var(--text-main); cursor: pointer; padding: 5px; }

        .side-menu {
            position: fixed; top: 0; right: -280px; width: 280px; height: 100%;
            background: var(--panel-bg); z-index: 3000; transition: right 0.3s ease;
            box-shadow: -5px 0 15px rgba(0,0,0,0.5); padding: 20px;
        }
        .side-menu.open { right: 0; }
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 2500; display: none;
        }
        .menu-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); padding-bottom: 15px; margin-bottom: 20px;
        }
        .menu-section-title { font-size: 0.75rem; color: var(--primary-color); text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 10px; display: block; }
        .menu-item {
            display: flex; align-items: center; gap: 12px; color: var(--text-main); padding: 10px;
            text-decoration: none; border-radius: 8px; margin-bottom: 5px; cursor: pointer; transition: background 0.2s; font-size: 0.9rem;
        }
        .menu-item:hover { background: #333; }
        .lang-select {
            width: 100%; padding: 10px; background: #2a2a2a; color: #fff; border: 1px solid var(--border-color); border-radius: 8px; font-size: 0.9rem;
        }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 90%; max-width: 500px; background: var(--panel-bg); border: 1px solid var(--primary-color);
            border-radius: 16px; z-index: 4000; padding: 20px; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .title-area { text-align: center; margin-bottom: 15px; }
        .title-area h2 { color: var(--primary-color); font-size: 0.9rem; letter-spacing: 4px; margin: 0; font-weight: bold; text-transform: uppercase; }

        .mode-tabs { display: flex; justify-content: center; gap: 4px; margin-bottom: 15px; background: var(--panel-bg); padding: 4px; border-radius: 10px; border: 1px solid var(--border-color); }
        .tab-btn { background: transparent; border: none; color: var(--text-dim); padding: 8px; cursor: pointer; border-radius: 6px; font-size: 0.75rem; flex: 1; transition: all 0.3s ease; }
        .tab-btn.active { background: var(--primary-color); color: #121212; font-weight: bold; }

        .content-section { display: none; }
        .content-section.active { display: block; }

        .clear-btn-container { margin-bottom: 10px; display: flex; justify-content: center; gap: 10px; }
        .clear-btn-ja { background: #333; border: none; color: var(--text-main); padding: 6px 15px; border-radius: 20px; font-size: 0.75rem; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .guide-box-inner { font-size: 0.8rem; color: var(--text-dim); line-height: 1.6; }
        .guide-box-inner b { color: var(--primary-color); font-size: 1rem; display: block; margin-bottom: 8px; border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }

        #ytPlayerContainer { position: relative; width: 100%; aspect-ratio: 16 / 9; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); background: #000; }
        #ytPlayerContainer iframe { position: absolute; top: 0; left: 0; width: 100% !important; height: 100% !important; }

        .loop-btn-main { background: var(--primary-color); color: #121212; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; min-width: 80px; }
        .adj-btn { background: #333; border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 32px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
        
        .loop-list-container { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; max-height: 200px; overflow-y: auto; }
        .loop-item { background: #252525; padding: 8px 12px; border-radius: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; }
        .loop-info { flex-grow: 1; cursor: pointer; }
        .loop-name { color: var(--primary-color); font-weight: bold; margin-right: 10px; }
        .loop-times { color: var(--text-dim); font-size: 0.7rem; }
        .loop-delete { color: #ff5555; cursor: pointer; padding: 5px; }

        .history-card { background: #252525; border: 1px solid var(--border-color); border-radius: 6px; padding: 8px 12px; min-width: 180px; max-width: 220px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .history-label { font-size: 0.7rem; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-del { color: #ff5555; font-size: 16px; margin-left: 8px; }

        @media (max-width: 480px) {
            .transport-controls { gap: 8px; }
            .btn-ctrl { width: 42px; height: 42px; }
            .play-main { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-logo">AMS PLAYER</div>
    <button class="menu-trigger" onclick="toggleMenu(true)">
        <span class="material-icons">menu</span>
    </button>
</header>

<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu(false)"></div>
<div class="side-menu" id="sideMenu">
    <div class="menu-header">
        <span style="font-weight:bold; color:var(--primary-color);">MENU</span>
        <button class="menu-trigger" onclick="toggleMenu(false)">
            <span class="material-icons">close</span>
        </button>
    </div>
    <span class="menu-section-title" id="langTitle">Language Settings</span>
    <select id="langSelect" class="lang-select" onchange="changeLanguage()">
        <option value="ja">日本語</option>
        <option value="en">English</option>
    </select>
    <span class="menu-section-title" id="helpTitle">Help & Guide</span>
    <div class="menu-item" onclick="showGuide('file')"><span class="material-icons">description</span><span id="guideFileTitle">Audio File Mode Guide</span></div>
    <div class="menu-item" onclick="showGuide('yt')"><span class="material-icons">smart_display</span><span id="guideYTTitle">YouTube Mode Guide</span></div>
</div>

<div id="guideModalFile" class="modal">
    <div class="guide-box-inner" id="guideFileContent"></div>
    <button class="clear-btn-ja" id="closeBtn1" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div id="guideModalYT" class="modal">
    <div class="guide-box-inner" id="guideYTContent"></div>
    <button class="clear-btn-ja" id="closeBtn2" style="width:100%; margin-top:20px;" onclick="closeModals()">閉じる</button>
</div>

<div class="container">
    <div class="title-area"><h2>AMS Practice Player</h2></div>

    <div class="mode-tabs">
        <button class="tab-btn active" id="tab-file" onclick="switchMode('file')">Audio File Mode</button>
        <button class="tab-btn" id="tab-yt" onclick="switchMode('yt')">YouTube Mode</button>
    </div>

    <div id="file-section" class="content-section active">
        <label for="audioFile" class="custom-file-upload" id="fileSelectBtn">ファイルを選択</label>
        <input type="file" id="audioFile" accept="audio/*">

        <div class="waveform-label">
            <span id="loadStatus">READY</span>
            <div style="display:flex; align-items:center; gap:8px;">
                <span class="material-icons" style="font-size:18px;">zoom_in</span>
                <input type="range" id="zoomSlider" min="0" max="500" value="100" style="width:80px;">
                <button class="reset-btn" id="resetZoomBtn">FIT</button>
            </div>
            <span class="time-display"><span id="currentTime">00:00</span> / <span id="totalTime">00:00</span></span>
        </div>
        
        <div id="waveform-wrapper">
            <div id="countdown-overlay"></div>
            <div id="waveform"></div>
        </div>

        <div class="clear-btn-container">
            <button class="clear-btn-ja" onclick="wsRegions.clearRegions()" id="clearRangeBtn">
                <span class="material-icons" style="font-size:16px;">layers_clear</span> 範囲解除
            </button>
            <button class="clear-btn-ja" onclick="saveLoop('file')" id="saveLoopBtn" style="border: 1px solid var(--primary-color);">
                <span class="material-icons" style="font-size:16px;">bookmark_add</span> ループ保存
            </button>
        </div>

        <div id="loopListFile" class="loop-list-container"></div>
        
        <div class="transport-controls">
            <button class="btn-ctrl active" id="countToggleBtn" onclick="toggleFeature('count')">
                <span class="material-icons">timer</span>
            </button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(-5)"><span class="material-icons">replay_5</span></button>
            <button class="btn-ctrl play-main" id="playBtn"><span class="material-icons" id="playIcon" style="font-size:35px;">play_arrow</span></button>
            <button class="btn-ctrl" onclick="wavesurfer.skip(5)"><span class="material-icons">forward_5</span></button>
            <button class="btn-ctrl" id="speedUpToggleBtn" onclick="toggleFeature('speedup')">
                <span class="material-icons">speed</span>
            </button>
        </div>

        <div class="panel" style="border-color: var(--recording-red);">
            <div class="row">
                <span style="font-size:0.7rem; color:var(--recording-red); font-weight:bold; letter-spacing:1px;">SELF-RECORDING CHECK</span>
                <button class="btn-ctrl rec-btn" id="recBtn" onclick="toggleRecording()">
                    <span class="material-icons" id="recIcon">mic</span>
                </button>
            </div>
            <div id="rec-waveform-wrapper">
                <div id="rec-waveform"></div>
            </div>
            <div class="row" id="recControls" style="display:none; justify-content:center;">
                <button class="clear-btn-ja" onclick="playRecording()" id="playRecBtn">
                    <span class="material-icons">play_circle</span> <span id="recPlayTxt">録音再生</span>
                </button>
                <button class="clear-btn-ja" onclick="deleteRecording()" style="color:#ff5555;">
                    <span class="material-icons">delete</span> 削除
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Speed <button class="reset-btn" onclick="resetSetting('speed', 1.0)">Reset</button></div>
                <input type="range" id="speed" min="0.5" max="1.5" step="0.01" value="1.0">
                <span id="spTxt" class="val-display">BPM 120</span>
            </div>
            <div class="row">
                <div style="min-width:65px; font-weight:bold; color:var(--text-dim); font-size:0.75rem;">Pitch <button class="reset-btn" onclick="resetSetting('pitch', 0)">Reset</button></div>
                <input type="range" id="pitch" min="-6" max="6" step="1" value="0">
                <span id="pitchTxt" class="val-display">±0</span>
            </div>
        </div>
    </div>

    <div id="yt-section" class="content-section">
        <div style="display:flex; gap:8px; margin-bottom:10px; background:var(--panel-bg); padding:10px; border-radius:10px; border: 1px solid var(--border-color);">
            <input type="text" id="ytUrl" placeholder="YouTube URL..." style="flex-grow:1; padding:10px; border:1px solid var(--border-color); background:#000; color:#fff; border-radius:6px; font-size:0.8rem;">
            <button class="tab-btn active" style="flex:0; min-width:60px;" onclick="loadYouTube()">LOAD</button>
        </div>
        <div id="ytHistoryContainer" style="margin-bottom: 15px; display: none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                <span style="font-size:0.7rem; color:var(--primary-color); font-weight:bold;">RECENT HISTORY</span>
                <button class="reset-btn" onclick="clearYTHistory()" style="font-size:0.6rem;">Clear All</button>
            </div>
            <div id="ytHistoryList" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;"></div>
        </div>
        <div id="ytPlayerContainer"><div id="player"></div></div>
        <div class="panel" style="margin-top:15px;">
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" id="setStartBtn" onclick="setLoopPoint('start')">SET START</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('start', -1)">-1s</button>
                    <span id="loopStartTxt" class="time-display">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('start', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; flex-wrap: wrap; gap: 10px;">
                <button class="loop-btn-main" id="setEndBtn" onclick="setLoopPoint('end')">SET END</button>
                <div style="background:#000; padding:5px; border-radius:8px; border:1px solid var(--border-color); display:flex; align-items:center; gap:5px;">
                    <button class="adj-btn" onclick="adjustTime('end', -1)">-1s</button>
                    <span id="loopEndTxt" class="time-display">00:00</span>
                    <button class="adj-btn" onclick="adjustTime('end', 1)">+1s</button>
                </div>
            </div>
            <div class="row" style="justify-content: center; gap: 10px;">
                <button id="toggleLoopBtn" class="tab-btn" style="width:140px; border:1px solid var(--border-color);" onclick="toggleLoop()">LOOP OFF</button>
                <button class="clear-btn-ja" onclick="saveLoop('yt')" id="saveLoopBtnYT" style="border: 1px solid var(--primary-color); border-radius: 6px; padding: 8px 12px;">
                    <span class="material-icons" style="font-size:16px;">bookmark_add</span> SAVE
                </button>
            </div>
        </div>
        <div id="loopListYT" class="loop-list-container"></div>
    </div>
</div>

<script>
    const translations = {
        ja: {
            langTitle: "言語設定", helpTitle: "ヘルプ & ガイド", guideFile: "Audio Fileモード ガイド", guideYT: "YouTubeモード ガイド",
            close: "閉じる", fit: "全体表示", clear: "範囲解除", ready: "準備完了", analyzing: "解析中...",
            setStart: "開始位置", setEnd: "終了位置", loopOff: "ループ OFF", loopOn: "ループ ON",
            fileSelect: "ファイルを選択", saveLoop: "ループ保存", recPlay: "録音再生", recStop: "再生停止",
            guideFileContent: "<b>【Audio File Mode】ガイド</b><ul><li>録音: マイクボタンで練習を録音。</li><li>カウント: 4拍の予備拍後に開始。</li><li>ループ: 波形ドラッグで範囲指定。</li></ul>",
            guideYTContent: "<b>【YouTube Mode】ガイド</b><ul><li>LOAD: URLを貼り付けて読込。</li><li>保存: SET START/ENDで区間保存。</li></ul>"
        },
        en: {
            langTitle: "Language Settings", helpTitle: "Help & Guide", guideFile: "Audio File Mode Guide", guideYT: "YouTube Mode Guide",
            close: "Close", fit: "FIT", clear: "Clear Loop", ready: "READY", analyzing: "ANALYZING...",
            setStart: "SET START", setEnd: "SET END", loopOff: "LOOP OFF", loopOn: "LOOP ON",
            fileSelect: "Select Audio File", saveLoop: "Save Loop", recPlay: "Play Rec", recStop: "Stop Rec",
            guideFileContent: "<b>【Audio File Mode】Guide</b><ul><li>Recording: Click Mic to record your play.</li><li>Count: Starts after 4-beat lead-in.</li><li>Loop: Drag on waveform to set range.</li></ul>",
            guideYTContent: "<b>【YouTube Mode】Guide</b><ul><li>Load: Paste URL and press LOAD.</li><li>Save: Use SET START/END to save.</li></ul>"
        }
    };

    let wavesurfer, wsRegions, recWavesurfer, ytPlayer, loopInterval;
    let loopStart = 0, loopEnd = 0, isLooping = false, currentMode = 'file';
    let audioCtx, firstSoundTime = 0, originalBpm = 120;
    let currentObjectURL = null, currentFileName = "", currentYTId = "";
    let isCountEnabled = true, isSpeedUpEnabled = false;

    // 録音用変数
    let mediaRecorder, recordedChunks = [], isRecording = false;

    function initAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        return audioCtx;
    }

    function toggleFeature(type) {
        if (type === 'count') { isCountEnabled = !isCountEnabled; document.getElementById('countToggleBtn').classList.toggle('active', isCountEnabled); }
        else if (type === 'speedup') { isSpeedUpEnabled = !isSpeedUpEnabled; document.getElementById('speedUpToggleBtn').classList.toggle('active', isSpeedUpEnabled); }
    }

    function switchMode(mode) {
        currentMode = mode;
        document.getElementById('file-section').classList.toggle('active', mode === 'file');
        document.getElementById('yt-section').classList.toggle('active', mode === 'yt');
        document.getElementById('tab-file').classList.toggle('active', mode === 'file');
        document.getElementById('tab-yt').classList.toggle('active', mode === 'yt');
        if(mode === 'yt' && wavesurfer) wavesurfer.pause();
        if(mode === 'file' && ytPlayer && ytPlayer.pauseVideo) ytPlayer.pauseVideo();
    }

    // 録音機能の実装
    async function toggleRecording() {
        initAudioContext();
        if (isRecording) {
            mediaRecorder.stop();
            if (wavesurfer.isPlaying()) wavesurfer.pause();
            isRecording = false;
            document.getElementById('recBtn').classList.remove('recording');
            document.getElementById('recIcon').innerText = 'mic';
        } else {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                recordedChunks = [];

                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    document.getElementById('rec-waveform-wrapper').style.display = 'block';
                    document.getElementById('recControls').style.display = 'flex';
                    recWavesurfer.load(url);
                    // ストリーム停止
                    stream.getTracks().forEach(track => track.stop());
                };

                // ループ範囲がある場合はその開始位置へ
                const region = wsRegions.getRegions()[0];
                if (region) wavesurfer.setTime(region.start);

                // カウントダウン後に録音開始
                await runCountdown();
                mediaRecorder.start();
                wavesurfer.play();
                isRecording = true;
                document.getElementById('recBtn').classList.add('recording');
                document.getElementById('recIcon').innerText = 'stop';
            } catch (err) {
                alert("マイクの使用が許可されていないか、利用できません。");
            }
        }
    }

    function playRecording() {
        if (!recWavesurfer) return;
        if (recWavesurfer.isPlaying()) {
            recWavesurfer.pause();
        } else {
            recWavesurfer.play();
        }
    }

    function deleteRecording() {
        if (confirm("録音データを削除しますか？")) {
            document.getElementById('rec-waveform-wrapper').style.display = 'none';
            document.getElementById('recControls').style.display = 'none';
            recWavesurfer.empty();
        }
    }

    // 既存機能
    async function analyzeAudio(blob) {
        const lang = document.getElementById('langSelect').value;
        const statusEl = document.getElementById('loadStatus');
        statusEl.innerText = translations[lang].analyzing;
        const tempCtx = new (window.AudioContext || window.webkitAudioContext)();
        try {
            const arrayBuffer = await blob.arrayBuffer();
            const audioBuffer = await tempCtx.decodeAudioData(arrayBuffer);
            const data = audioBuffer.getChannelData(0);
            let skip = 0; const threshold = 0.015;
            for (let i = 0; i < data.length; i += 100) { if (Math.abs(data[i]) > threshold) { skip = i / audioBuffer.sampleRate; break; } }
            firstSoundTime = skip;
            const bpm = detectBPM(audioBuffer);
            if (bpm > 0) { originalBpm = Math.round(bpm); updateBpmDisplay(); }
            statusEl.innerText = translations[lang].ready;
            if(wavesurfer && wavesurfer.isReady) wavesurfer.setTime(firstSoundTime);
        } catch (e) { statusEl.innerText = translations[lang].ready; } finally { tempCtx.close(); }
    }

    function updateBpmDisplay() {
        const s = parseFloat(document.getElementById('speed').value);
        document.getElementById('spTxt').innerText = "BPM " + Math.round(originalBpm * s);
    }

    function detectBPM(buffer) {
        const data = buffer.getChannelData(0), sampleRate = buffer.sampleRate, step = 200, energy = [];
        for (let i = 0; i < data.length; i += step) {
            let sum = 0; for(let j=0; j<step && (i+j)<data.length; j++) sum += data[i+j] * data[i+j];
            energy.push(Math.sqrt(sum/step));
        }
        let bestBpm = 0, maxCorrelation = 0;
        const minInterval = Math.floor((60 / 220) * (sampleRate / step)), maxInterval = Math.floor((60 / 60) * (sampleRate / step));
        for (let interval = minInterval; interval <= maxInterval; interval++) {
            let correlation = 0; for (let i = 0; i < Math.min(energy.length - interval, 10000); i++) correlation += energy[i] * energy[i + interval];
            if (correlation > maxCorrelation) { maxCorrelation = correlation; bestBpm = 60 / (interval * step / sampleRate); }
        }
        return (bestBpm < 50 || bestBpm > 250) ? 0 : bestBpm;
    }

    function playBeep(isLast) {
        const ctx = initAudioContext();
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.frequency.setValueAtTime(isLast ? 880 : 440, ctx.currentTime);
        g.gain.setValueAtTime(0.1, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
        osc.connect(g); g.connect(ctx.destination);
        osc.start(); osc.stop(ctx.currentTime + 0.1);
    }

    async function runCountdown() {
        if (!isCountEnabled) return true;
        const speed = parseFloat(document.getElementById('speed').value);
        const interval = 60000 / (originalBpm * speed);
        const overlay = document.getElementById('countdown-overlay');
        overlay.style.display = 'block';
        for (let i = 1; i <= 4; i++) {
            overlay.innerText = i; playBeep(i === 4);
            await new Promise(r => setTimeout(r, interval));
        }
        overlay.style.display = 'none'; return true;
    }

    // YouTube 関連
    const tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    function onYouTubeIframeAPIReady() {}

    function loadYouTube(manualUrl = null) {
        const url = manualUrl || document.getElementById('ytUrl').value;
        if (!url) return;
        const vid = url.match(/(?:v=|\/be\/)([\w-]+)/);
        if (vid) {
            currentYTId = vid[1];
            if (ytPlayer && ytPlayer.loadVideoById) { ytPlayer.loadVideoById(currentYTId); }
            else { ytPlayer = new YT.Player('player', { videoId: currentYTId, events: { 'onReady': () => { saveToHistory(currentYTId, ytPlayer.getVideoData().title); renderLoopList('yt'); }, 'onStateChange': onPlayerStateChange } }); }
        }
    }

    function onPlayerStateChange(e) {
        if (e.data === YT.PlayerState.PLAYING) {
            loopInterval = setInterval(() => { if (isLooping && ytPlayer.getCurrentTime() >= loopEnd) ytPlayer.seekTo(loopStart); }, 200);
        } else { clearInterval(loopInterval); }
    }

    const fmt = (s) => `${Math.floor(s/60).toString().padStart(2,'0')}:${Math.floor(s%60).toString().padStart(2,'0')}`;
    window.setLoopPoint = (type) => {
        const now = ytPlayer.getCurrentTime();
        if (type === 'start') { loopStart = Math.floor(now); document.getElementById('loopStartTxt').innerText = fmt(loopStart); }
        else { loopEnd = Math.ceil(now); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    };

    window.adjustTime = (t, a) => {
        if (t === 'start') { loopStart = Math.max(0, loopStart + a); document.getElementById('loopStartTxt').innerText = fmt(loopStart); ytPlayer.seekTo(loopStart); }
        else { loopEnd = Math.max(loopStart + 1, loopEnd + a); document.getElementById('loopEndTxt').innerText = fmt(loopEnd); }
    };

    window.toggleLoop = () => { isLooping = !isLooping; const lang = document.getElementById('langSelect').value; const b = document.getElementById('toggleLoopBtn'); b.innerText = isLooping ? translations[lang].loopOn : translations[lang].loopOff; b.classList.toggle('active', isLooping); };

    // 保存関連
    function saveLoop(mode) {
        let s, e, key;
        if (mode === 'file') { const r = wsRegions.getRegions()[0]; if(!r) return; s=r.start; e=r.end; key=currentFileName; }
        else { if(!currentYTId) return; s=loopStart; e=loopEnd; key=currentYTId; }
        const name = prompt("名前を入力:", fmt(s)); if(!name) return;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        let all = JSON.parse(localStorage.getItem(storageKey) || "{}");
        if(!all[key]) all[key] = []; all[key].push({name, start:s, end:e});
        localStorage.setItem(storageKey, JSON.stringify(all));
        renderLoopList(mode);
    }

    function renderLoopList(mode) {
        const key = mode === 'file' ? currentFileName : currentYTId;
        const storageKey = mode === 'file' ? 'ams_loops' : 'ams_yt_loops';
        const container = document.getElementById(mode === 'file' ? 'loopListFile' : 'loopListYT');
        container.innerHTML = ""; if(!key) return;
        const loops = JSON.parse(localStorage.getItem(storageKey) || "{}")[key] || [];
        loops.forEach((l, i) => {
            const div = document.createElement('div'); div.className = 'loop-item';
            div.innerHTML = `<div class="loop-info" onclick="applyStoredLoop('${mode}', ${l.start}, ${l.end})"><span class="loop-name">${l.name}</span><span class="loop-times">${fmt(l.start)} - ${fmt(l.end)}</span></div><span class="material-icons loop-delete" onclick="deleteLoop('${mode}', ${i})">delete</span>`;
            container.appendChild(div);
        });
    }

    window.applyStoredLoop = (m, s, e) => {
        if(m === 'file') { wsRegions.clearRegions(); wsRegions.addRegion({start:s, end:e, color:'rgba(212,163,115,0.2)'}); wavesurfer.setTime(s); }
        else { loopStart=s; loopEnd=e; document.getElementById('loopStartTxt').innerText=fmt(s); document.getElementById('loopEndTxt').innerText=fmt(e); ytPlayer.seekTo(s); if(!isLooping) toggleLoop(); }
    };

    window.deleteLoop = (m, i) => {
        const sk = m === 'file' ? 'ams_loops' : 'ams_yt_loops', k = m === 'file' ? currentFileName : currentYTId;
        let all = JSON.parse(localStorage.getItem(sk)); all[k].splice(i, 1);
        localStorage.setItem(sk, JSON.stringify(all)); renderLoopList(m);
    };

    function saveToHistory(id, title) {
        let h = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        h = h.filter(x => x.id !== id); h.unshift({id, title: title || id, url: `https://youtu.be/${id}`});
        localStorage.setItem('ams_yt_history', JSON.stringify(h.slice(0, 10))); renderYTHistory();
    }

    function renderYTHistory() {
        const list = document.getElementById('ytHistoryList'), h = JSON.parse(localStorage.getItem('ams_yt_history') || "[]");
        document.getElementById('ytHistoryContainer').style.display = h.length ? 'block' : 'none';
        list.innerHTML = h.map(x => `<div class="history-card" onclick="loadYouTube('${x.url}')"><span class="history-label">${x.title}</span><span class="material-icons history-del" onclick="event.stopPropagation(); deleteHistoryItem('${x.id}')">cancel</span></div>`).join('');
    }

    window.deleteHistoryItem = (id) => {
        let h = JSON.parse(localStorage.getItem('ams_yt_history')).filter(x => x.id !== id);
        localStorage.setItem('ams_yt_history', JSON.stringify(h)); renderYTHistory();
    };

    window.clearYTHistory = () => { localStorage.removeItem('ams_yt_history'); renderYTHistory(); };

    // 言語・メニュー
    function changeLanguage() {
        const l = document.getElementById('langSelect').value; const t = translations[l];
        document.getElementById('langTitle').innerText = t.langTitle;
        document.getElementById('helpTitle').innerText = t.helpTitle;
        document.getElementById('guideFileTitle').innerText = t.guideFile;
        document.getElementById('guideYTTitle').innerText = t.guideYT;
        document.getElementById('fileSelectBtn').innerText = currentFileName || t.fileSelect;
        document.getElementById('loadStatus').innerText = t.ready;
        document.getElementById('recPlayTxt').innerText = t.recPlay;
        document.getElementById('guideFileContent').innerHTML = t.guideFileContent;
        document.getElementById('guideYTContent').innerHTML = t.guideYTContent;
        document.getElementById('toggleLoopBtn').innerText = isLooping ? t.loopOn : t.loopOff;
    }

    function toggleMenu(o) { document.getElementById('sideMenu').classList.toggle('open', o); document.getElementById('menuOverlay').style.display = o ? 'block' : 'none'; }
    function showGuide(t) { toggleMenu(false); document.getElementById('guideModal' + (t==='file'?'File':'YT')).style.display = 'block'; document.getElementById('menuOverlay').style.display = 'block'; }
    function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); document.getElementById('menuOverlay').style.display = 'none'; }

    // アプリ初期化
    function startApp() {
        wavesurfer = WaveSurfer.create({ container: '#waveform', waveColor: '#333', progressColor: '#d4a373', height: 120, barWidth: 2, normalize: true, cursorColor: '#fff', interact: true });
        recWavesurfer = WaveSurfer.create({ container: '#rec-waveform', waveColor: '#522', progressColor: '#f44', height: 80, barWidth: 2 });
        
        wsRegions = wavesurfer.registerPlugin(WaveSurfer.Regions.create());
        wsRegions.enableDragSelection({ color: 'rgba(212, 163, 115, 0.2)' });
        wsRegions.on('region-created', r => { if(wsRegions.getRegions().length > 1) wsRegions.getRegions()[0].remove(); wavesurfer.setTime(r.start); });

        // ファイル読込修正：確実に発火するように
        document.getElementById('audioFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if(file) {
                currentFileName = file.name;
                document.getElementById('fileSelectBtn').innerText = currentFileName;
                wsRegions.clearRegions();
                if(currentObjectURL) URL.revokeObjectURL(currentObjectURL);
                
                // Chrome/SafariでBlob読み込みを確実にするため一度ArrayBufferへ
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const blob = new Blob([ev.target.result], { type: file.type });
                    currentObjectURL = URL.createObjectURL(blob);
                    wavesurfer.load(currentObjectURL);
                    analyzeAudio(blob);
                    renderLoopList('file');
                };
                reader.readAsArrayBuffer(file);
            }
        });

        // 再生ボタン
        document.getElementById('playBtn').onclick = async () => {
            initAudioContext();
            if (wavesurfer.isPlaying()) {
                wavesurfer.pause();
            } else {
                const r = wsRegions.getRegions()[0];
                if (isCountEnabled && r && (wavesurfer.getCurrentTime() < r.start || wavesurfer.getCurrentTime() >= r.end)) wavesurfer.setTime(r.start);
                await runCountdown();
                wavesurfer.play();
            }
        };

        const applySet = () => {
            const s = parseFloat(document.getElementById('speed').value), p = parseInt(document.getElementById('pitch').value);
            wavesurfer.setPlaybackRate(s);
            const media = wavesurfer.getMediaElement();
            if(media) media.preservesPitch = (p === 0);
            updateBpmDisplay();
            document.getElementById('pitchTxt').innerText = (p > 0 ? "+" : "") + p;
        };

        document.getElementById('speed').oninput = applySet;
        document.getElementById('pitch').oninput = applySet;
        document.getElementById('zoomSlider').oninput = (e) => wavesurfer.zoom(Number(e.target.value));
        document.getElementById('resetZoomBtn').onclick = () => { wavesurfer.zoom(0); document.getElementById('zoomSlider').value = 0; };

        wavesurfer.on('ready', () => { document.getElementById('totalTime').innerText = fmt(wavesurfer.getDuration()); applySet(); });
        wavesurfer.on('play', () => document.getElementById('playIcon').innerText = 'pause');
        wavesurfer.on('pause', () => document.getElementById('playIcon').innerText = 'play_arrow');
        wavesurfer.on('timeupdate', t => {
            document.getElementById('currentTime').innerText = fmt(t);
            const r = wsRegions.getRegions()[0];
            if(r && t >= r.end) {
                wavesurfer.setTime(r.start);
                if (isSpeedUpEnabled) { const s = document.getElementById('speed'); s.value = Math.min(1.5, parseFloat(s.value) + 0.05).toFixed(2); applySet(); }
                if (isRecording) toggleRecording(); // 録音中にループ端に来たら自動停止
            }
        });

        // 録音再生アイコン同期
        recWavesurfer.on('play', () => { const l = document.getElementById('langSelect').value; document.getElementById('playRecBtn').innerHTML = `<span class="material-icons">stop_circle</span> ${translations[l].recStop}`; });
        recWavesurfer.on('pause', () => { const l = document.getElementById('langSelect').value; document.getElementById('playRecBtn').innerHTML = `<span class="material-icons">play_circle</span> ${translations[l].recPlay}`; });
        recWavesurfer.on('finish', () => { const l = document.getElementById('langSelect').value; document.getElementById('playRecBtn').innerHTML = `<span class="material-icons">play_circle</span> ${translations[l].recPlay}`; });

        changeLanguage();
        renderYTHistory();
    }

    window.resetSetting = (id, val) => { document.getElementById(id).value = val; if(wavesurfer) wavesurfer.setPlaybackRate(val); updateBpmDisplay(); };
    window.addEventListener('DOMContentLoaded', startApp);
</script>
